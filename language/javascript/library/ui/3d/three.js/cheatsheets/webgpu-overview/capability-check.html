<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU 能力检测</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebGPU</a>
      <span>观察浏览器是否能拿到 WebGPU adapter 和 device</span>
    </header>
    <main class="lesson-shell text-only">
      <section class="panel wide-panel" aria-label="能力检测结果">
        <h1>能力检测</h1>
        <div class="control-row">
          <label>
            GPU 偏好
            <select id="power-preference">
              <option value="">默认</option>
              <option value="high-performance">高性能</option>
              <option value="low-power">低功耗</option>
            </select>
          </label>
          <button id="run-check" type="button">重新检测</button>
        </div>
        <p class="status-line" id="summary-state">等待检测</p>
        <dl class="metrics compact" id="capability-list"></dl>
      </section>
    </main>
    <script type="module" src="./src/capability-check-main.js"></script>
  </body>
</html>
