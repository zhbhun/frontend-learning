<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU renderer 初始化</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebGPU</a>
      <span>观察 WebGPURenderer 的异步初始化和 WebGL fallback</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="renderer 初始化预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="renderer 初始化控制面板">
        <h1>初始化流程</h1>
        <label class="checkbox-row">
          <input id="force-webgl" type="checkbox" />
          强制使用 WebGLRenderer fallback
        </label>
        <button id="restart-renderer" type="button">重新初始化</button>
        <p class="status-line" id="renderer-state">等待初始化</p>
        <dl class="metrics">
          <div><dt>检测结果</dt><dd id="support-state">-</dd></div>
          <div><dt>当前 renderer</dt><dd id="active-renderer">-</dd></div>
          <div><dt>初始化</dt><dd id="init-state">-</dd></div>
          <div><dt>尺寸</dt><dd id="size-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/renderer-init-main.js"></script>
  </body>
</html>
