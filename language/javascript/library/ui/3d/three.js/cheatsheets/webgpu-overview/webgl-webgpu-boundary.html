<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGL 与 WebGPU 边界</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebGPU</a>
      <span>同一类场景分别交给 WebGLRenderer 和 WebGPURenderer</span>
    </header>
    <main class="compare-shell">
      <section class="compare-stage">
        <article class="viewport named-viewport" aria-label="WebGLRenderer 对照">
          <header>WebGLRenderer</header>
          <canvas id="webgl-canvas"></canvas>
        </article>
        <article class="viewport named-viewport" aria-label="WebGPURenderer 对照">
          <header>WebGPURenderer</header>
          <canvas id="webgpu-canvas"></canvas>
        </article>
      </section>
      <aside class="panel" aria-label="渲染器边界控制面板">
        <h1>渲染器边界</h1>
        <label class="checkbox-row">
          <input id="force-webgpu-webgl" type="checkbox" />
          WebGPURenderer 强制 WebGL2 后端
        </label>
        <button id="restart-boundary" type="button">重建对照</button>
        <dl class="metrics">
          <div><dt>WebGLRenderer</dt><dd id="webgl-state">-</dd></div>
          <div><dt>WebGPURenderer</dt><dd id="webgpu-state">-</dd></div>
          <div><dt>共同接口</dt><dd id="shared-api-state">-</dd></div>
          <div><dt>不能假设</dt><dd id="boundary-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/webgl-webgpu-boundary-main.js"></script>
  </body>
</html>
