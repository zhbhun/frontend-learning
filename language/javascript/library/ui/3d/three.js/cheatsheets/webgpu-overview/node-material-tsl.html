<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeMaterial 与 TSL</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebGPU</a>
      <span>观察 MeshStandardNodeMaterial 如何用 TSL 节点描述材质输入</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="NodeMaterial 与 TSL 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="NodeMaterial 与 TSL 控制面板">
        <h1>NodeMaterial / TSL</h1>
        <label>
          旋转速度
          <span class="range-field">
            <input id="rotation-speed" type="range" min="0" max="1.8" step="0.05" value="0.7" />
            <output id="rotation-speed-value">0.70</output>
          </span>
        </label>
        <p class="status-line" id="node-state">等待初始化</p>
        <dl class="metrics">
          <div><dt>材质类型</dt><dd id="material-state">-</dd></div>
          <div><dt>节点输入</dt><dd id="node-input-state">-</dd></div>
          <div><dt>当前后端</dt><dd id="backend-state">-</dd></div>
          <div><dt>fallback</dt><dd id="fallback-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/node-material-tsl-main.js"></script>
  </body>
</html>
