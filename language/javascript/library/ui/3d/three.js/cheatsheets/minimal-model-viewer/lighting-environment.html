<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lighting Environment</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.3 查看器</a>
      <span>区分直接光、环境贴图和 renderer 曝光对模型查看的影响</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="光照与环境预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="光照与环境控制面板">
        <h1>Lighting Environment</h1>
        <label>
          光照模式
          <select id="lighting-mode">
            <option value="both">直接光 + 环境</option>
            <option value="lightsOnly">只用直接光</option>
            <option value="environmentOnly">只用环境</option>
            <option value="dim">弱光排查</option>
          </select>
        </label>
        <label>
          曝光
          <span class="range-field">
            <input id="exposure" type="range" min="0.3" max="1.8" step="0.1" value="1" />
            <output id="exposure-value">1.0</output>
          </span>
        </label>
        <label class="check-row">
          <input id="show-probe" type="checkbox" checked />
          显示 PBR 观察球
        </label>
        <dl class="metrics">
          <div>
            <dt>模式</dt>
            <dd id="mode-state">-</dd>
          </div>
          <div>
            <dt>环境</dt>
            <dd id="environment-state">-</dd>
          </div>
          <div>
            <dt>灯光</dt>
            <dd id="light-state">-</dd>
          </div>
          <div>
            <dt>renderer</dt>
            <dd id="renderer-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/lighting-environment-main.js"></script>
  </body>
</html>
