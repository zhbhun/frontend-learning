<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading State</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.3 查看器</a>
      <span>把加载中、失败、重试和旧请求过期做成可观察状态</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="加载状态预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="加载状态控制面板">
        <h1>Loading State</h1>
        <label>
          情况
          <select id="load-case">
            <option value="glb">有效 GLB</option>
            <option value="missingTopLevel">主文件不存在</option>
            <option value="missingBuffer">外部 .bin 丢失</option>
          </select>
        </label>
        <div class="button-row">
          <button id="run-load" type="button">加载</button>
          <button id="retry-valid" type="button">加载有效模型</button>
        </div>
        <dl class="metrics">
          <div>
            <dt>状态</dt>
            <dd id="load-state">等待加载</dd>
          </div>
          <div>
            <dt>进度</dt>
            <dd id="progress-state">-</dd>
          </div>
          <div>
            <dt>失败 URL</dt>
            <dd id="last-error-url">-</dd>
          </div>
          <div>
            <dt>错误</dt>
            <dd id="error-state">-</dd>
          </div>
          <div>
            <dt>恢复</dt>
            <dd id="recovery-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/loading-state-main.js"></script>
  </body>
</html>
