<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Frame</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.3 查看器</a>
      <span>用 Box3 的中心和尺寸自动设置相机与 OrbitControls 目标</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="自动取景预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="自动取景控制面板">
        <h1>Auto Frame</h1>
        <label>
          模型姿态
          <select id="frame-case">
            <option value="centered">居中</option>
            <option value="offset">偏移</option>
            <option value="large">放大</option>
            <option value="flat">压扁变宽</option>
          </select>
        </label>
        <label>
          留白
          <span class="range-field">
            <input id="fit-ratio" type="range" min="1.2" max="2.6" step="0.1" value="1.7" />
            <output id="fit-ratio-value">1.7</output>
          </span>
        </label>
        <button id="frame-model" type="button">重新取景</button>
        <dl class="metrics">
          <div>
            <dt>包围盒</dt>
            <dd id="bounds-state">-</dd>
          </div>
          <div>
            <dt>中心</dt>
            <dd id="center-state">-</dd>
          </div>
          <div>
            <dt>相机</dt>
            <dd id="camera-state">-</dd>
          </div>
          <div>
            <dt>目标</dt>
            <dd id="target-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/auto-frame-main.js"></script>
  </body>
</html>
