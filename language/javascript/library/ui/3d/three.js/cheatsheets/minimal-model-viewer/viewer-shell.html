<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewer Shell</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.3 查看器</a>
      <span>组合模型加载、相机控制、自动取景、状态和 resize</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="查看器预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="查看器控制面板">
        <h1>Viewer Shell</h1>
        <label>
          模型
          <select id="model-kind">
            <option value="glb">Box.glb</option>
            <option value="gltf">Box.gltf + Box0.bin</option>
            <option value="multiNode">MultiNodeBox.gltf</option>
          </select>
        </label>
        <label class="check-row">
          <input id="auto-rotate" type="checkbox" checked />
          自动旋转
        </label>
        <label class="check-row">
          <input id="show-grid" type="checkbox" checked />
          显示网格
        </label>
        <div class="button-row">
          <button id="reload-model" type="button">重新加载</button>
          <button id="reset-view" type="button">重新取景</button>
        </div>
        <dl class="metrics">
          <div>
            <dt>状态</dt>
            <dd id="load-state">等待加载</dd>
          </div>
          <div>
            <dt>管理器</dt>
            <dd id="manager-state">-</dd>
          </div>
          <div>
            <dt>模型</dt>
            <dd id="model-state">-</dd>
          </div>
          <div>
            <dt>取景</dt>
            <dd id="frame-state">-</dd>
          </div>
          <div>
            <dt>相机</dt>
            <dd id="camera-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/viewer-shell-main.js"></script>
  </body>
</html>
