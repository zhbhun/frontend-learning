<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>collider-shapes</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">物理</a>
      <span>ColliderDesc / collider-shapes</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="collider-shapes 预览">
        <canvas id="scene-canvas"></canvas>
        <div id="loading-state" class="loading-state">正在加载 Rapier WASM...</div>
      </section>
      <aside class="panel">
        <h1>碰撞体形状</h1>

        <label>
          碰撞体配置
          <select id="shape-mode">
            <option value="matched">mesh 与 collider 匹配</option>
            <option value="mismatched">故意错配 collider</option>
          </select>
        </label>

        <label class="checkbox-row">
          <input id="show-debug" type="checkbox" checked />
          显示 collider 线框
        </label>

        <label>
          掉落高度
          <output id="drop-height-value">5.0</output>
          <input id="drop-height" type="range" min="3" max="8" step="0.5" value="5" />
        </label>

        <div class="button-stack">
          <button id="reset-shapes" type="button">重置形状</button>
        </div>

        <dl class="metrics">
          <div><dt>配置</dt><dd id="mode-readout">-</dd></div>
          <div><dt>box</dt><dd id="box-readout">-</dd></div>
          <div><dt>sphere</dt><dd id="sphere-readout">-</dd></div>
          <div><dt>capsule</dt><dd id="capsule-readout">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/collider-shapes-main.js"></script>
  </body>
</html>
