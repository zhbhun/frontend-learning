<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>falling-bodies</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">物理</a>
      <span>World / RigidBody / Collider / falling-bodies</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="falling-bodies 预览">
        <canvas id="scene-canvas"></canvas>
        <div id="loading-state" class="loading-state">正在加载 Rapier WASM...</div>
      </section>
      <aside class="panel">
        <h1>掉落刚体</h1>

        <label>
          物体数量
          <output id="body-count-value">12</output>
          <input id="body-count" type="range" min="3" max="36" step="3" value="12" />
        </label>

        <label>
          初始高度
          <output id="spawn-height-value">6.0</output>
          <input id="spawn-height" type="range" min="3" max="10" step="0.5" value="6" />
        </label>

        <label>
          弹性
          <output id="restitution-value">0.35</output>
          <input id="restitution" type="range" min="0" max="0.9" step="0.05" value="0.35" />
        </label>

        <div class="button-stack">
          <button id="reset-bodies" type="button">重置掉落</button>
        </div>

        <dl class="metrics">
          <div><dt>world</dt><dd id="world-readout">等待初始化</dd></div>
          <div><dt>step</dt><dd id="step-readout">0</dd></div>
          <div><dt>body</dt><dd id="body-readout">0</dd></div>
          <div><dt>最低高度</dt><dd id="lowest-readout">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/falling-bodies-main.js"></script>
  </body>
</html>
