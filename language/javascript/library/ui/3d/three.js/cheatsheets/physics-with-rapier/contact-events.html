<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact-events</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">物理</a>
      <span>EventQueue / contact-events</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="contact-events 预览">
        <canvas id="scene-canvas"></canvas>
        <div id="loading-state" class="loading-state">正在加载 Rapier WASM...</div>
      </section>
      <aside class="panel">
        <h1>接触事件</h1>

        <label>
          球数量
          <output id="ball-count-value">8</output>
          <input id="ball-count" type="range" min="3" max="18" step="1" value="8" />
        </label>

        <label>
          弹性
          <output id="bounce-value">0.65</output>
          <input id="bounce" type="range" min="0.1" max="0.95" step="0.05" value="0.65" />
        </label>

        <div class="button-stack">
          <button id="reset-events" type="button">重置事件</button>
        </div>

        <dl class="metrics">
          <div><dt>开始接触</dt><dd id="started-readout">0</dd></div>
          <div><dt>结束接触</dt><dd id="stopped-readout">0</dd></div>
          <div><dt>本帧事件</dt><dd id="frame-events-readout">0</dd></div>
          <div><dt>最近事件</dt><dd id="last-event-readout">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/contact-events-main.js"></script>
  </body>
</html>
