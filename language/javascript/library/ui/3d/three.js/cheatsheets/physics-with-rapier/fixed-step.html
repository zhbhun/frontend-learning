<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fixed-step</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">物理</a>
      <span>world.step / fixed-step</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="fixed-step 预览">
        <canvas id="scene-canvas"></canvas>
        <div id="loading-state" class="loading-state">正在加载 Rapier WASM...</div>
      </section>
      <aside class="panel">
        <h1>固定步长</h1>

        <label class="checkbox-row">
          <input id="inject-stutter" type="checkbox" checked />
          注入卡顿 delta
        </label>

        <label>
          卡顿间隔
          <output id="stutter-interval-value">36</output>
          <input id="stutter-interval" type="range" min="18" max="90" step="6" value="36" />
        </label>

        <label>
          卡顿 delta
          <output id="stutter-delta-value">0.16s</output>
          <input id="stutter-delta" type="range" min="0.08" max="0.28" step="0.02" value="0.16" />
        </label>

        <div class="button-stack">
          <button id="reset-step" type="button">重置对比</button>
        </div>

        <dl class="metrics">
          <div><dt>可变步长</dt><dd id="variable-readout">-</dd></div>
          <div><dt>固定步长</dt><dd id="fixed-readout">-</dd></div>
          <div><dt>本帧 delta</dt><dd id="delta-readout">-</dd></div>
          <div><dt>步数</dt><dd id="steps-readout">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/fixed-step-main.js"></script>
  </body>
</html>
