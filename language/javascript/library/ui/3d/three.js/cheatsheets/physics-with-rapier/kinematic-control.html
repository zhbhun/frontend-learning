<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinematic-control</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">物理</a>
      <span>kinematic / setNextKinematicTranslation</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="kinematic-control 预览">
        <canvas id="scene-canvas"></canvas>
        <div id="loading-state" class="loading-state">正在加载 Rapier WASM...</div>
      </section>
      <aside class="panel">
        <h1>Kinematic 控制</h1>

        <label>
          控制方式
          <select id="control-mode">
            <option value="next">setNextKinematicTranslation</option>
            <option value="teleport">setTranslation 瞬移</option>
          </select>
        </label>

        <label>
          平台速度
          <output id="platform-speed-value">1.2</output>
          <input id="platform-speed" type="range" min="0.3" max="2.4" step="0.1" value="1.2" />
        </label>

        <label>
          平台幅度
          <output id="platform-amplitude-value">2.4</output>
          <input id="platform-amplitude" type="range" min="0.8" max="3.2" step="0.1" value="2.4" />
        </label>

        <div class="button-stack">
          <button id="reset-kinematic" type="button">重置箱子</button>
        </div>

        <dl class="metrics">
          <div><dt>平台</dt><dd id="platform-readout">-</dd></div>
          <div><dt>箱子</dt><dd id="box-readout">-</dd></div>
          <div><dt>控制</dt><dd id="mode-readout">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/kinematic-control-main.js"></script>
  </body>
</html>
