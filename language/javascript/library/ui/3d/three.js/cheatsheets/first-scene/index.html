<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>第一幅 Three.js 画面</title>
  </head>
  <body>
    <div class="layout">
      <aside class="control-panel" aria-labelledby="lesson-title">
        <h1 id="lesson-title">第一幅 Three.js 画面</h1>

        <section class="control-group" aria-labelledby="render-mode-label">
          <h2 id="render-mode-label">渲染模式</h2>
          <div class="segmented-control" role="group" aria-label="渲染模式">
            <button class="segment is-active" type="button" data-mode="solid">实体</button>
            <button class="segment" type="button" data-mode="wireframe">线框</button>
          </div>
        </section>

        <section class="control-group" aria-labelledby="animation-label">
          <h2 id="animation-label">动画</h2>
          <button class="command-button" type="button" data-toggle-running>暂停动画</button>
          <button class="command-button secondary" type="button" data-reset>重置立方体</button>
        </section>

        <section class="control-group" aria-labelledby="speed-label">
          <div class="slider-header">
            <h2 id="speed-label">速度</h2>
            <output data-speed-value>1.0x</output>
          </div>
          <input data-speed type="range" min="0" max="2" step="0.1" value="1" />
        </section>

        <section class="control-group" aria-labelledby="camera-label">
          <div class="slider-header">
            <h2 id="camera-label">相机 Z</h2>
            <output data-camera-value>4.2</output>
          </div>
          <input data-camera-distance type="range" min="2.4" max="7" step="0.1" value="4.2" />
        </section>
      </aside>

      <main class="stage-panel">
        <div class="stage-toolbar">
          <span>预览</span>
          <span data-frame-readout>第 0 帧</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas" aria-label="Rotating cube scene"></canvas>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
