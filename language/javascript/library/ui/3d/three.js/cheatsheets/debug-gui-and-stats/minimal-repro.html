<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>最小复现</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">调试</a>
        <h1 id="page-title">最小复现</h1>

        <div class="control-group">
          <h2>复现模式</h2>
          <label class="choice-row">
            <input type="radio" name="repro-mode" value="normal" checked />
            <span>正常参照</span>
          </label>
          <label class="choice-row">
            <input type="radio" name="repro-mode" value="empty" />
            <span>空场景</span>
          </label>
          <label class="choice-row">
            <input type="radio" name="repro-mode" value="unlit-material" />
            <span>材质无光</span>
          </label>
          <label class="choice-row">
            <input type="radio" name="repro-mode" value="tiny-scale" />
            <span>尺寸过小</span>
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>模式</dt>
            <dd id="mode-readout">正常参照</dd>
          </div>
          <div>
            <dt>节点</dt>
            <dd id="nodes-readout">0</dd>
          </div>
          <div>
            <dt>包围盒</dt>
            <dd id="box-readout">-</dd>
          </div>
          <div>
            <dt>判断</dt>
            <dd id="diagnosis-readout">可见基线</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="最小复现预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>Minimal Repro</span>
          <span id="toolbar-readout">normal</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/minimal-repro-main.js"></script>
  </body>
</html>
