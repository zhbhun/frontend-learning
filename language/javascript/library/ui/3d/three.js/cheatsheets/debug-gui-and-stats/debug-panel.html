<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lil-gui 调参</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">调试</a>
        <h1 id="page-title">lil-gui 调参</h1>

        <div class="control-group">
          <h2>调试面板</h2>
          <div id="gui-mount" class="gui-mount"></div>
        </div>

        <dl class="metrics">
          <div>
            <dt>材质</dt>
            <dd id="material-readout">MeshStandardMaterial</dd>
          </div>
          <div>
            <dt>光照</dt>
            <dd id="light-readout">1.60</dd>
          </div>
          <div>
            <dt>对象</dt>
            <dd id="object-readout">rotationY 0°, scale 1.00</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="lil-gui 调参预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>MeshStandardMaterial</span>
          <span id="toolbar-readout">ready</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/debug-panel-main.js"></script>
  </body>
</html>
