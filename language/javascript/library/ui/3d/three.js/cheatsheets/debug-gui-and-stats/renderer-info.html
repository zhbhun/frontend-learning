<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>renderer.info</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">调试</a>
        <h1 id="page-title">renderer.info</h1>

        <div class="control-group">
          <h2>对象数量</h2>
          <div class="button-row" role="group" aria-label="对象数量">
            <button id="count-1-button" type="button">1</button>
            <button id="count-24-button" type="button">24</button>
            <button id="count-96-button" type="button">96</button>
          </div>
          <label class="switch-row">
            <input id="texture-input" type="checkbox" checked />
            <span>使用 CanvasTexture</span>
          </label>
        </div>

        <div class="control-group">
          <h2>FPS</h2>
          <div id="stats-mount" class="stats-mount"></div>
        </div>

        <dl class="metrics compact-metrics">
          <div>
            <dt>Objects</dt>
            <dd id="objects-readout">0</dd>
          </div>
          <div>
            <dt>Calls</dt>
            <dd id="calls-readout">0</dd>
          </div>
          <div>
            <dt>Triangles</dt>
            <dd id="triangles-readout">0</dd>
          </div>
          <div>
            <dt>Textures</dt>
            <dd id="textures-readout">0</dd>
          </div>
          <div>
            <dt>Programs</dt>
            <dd id="programs-readout">0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="renderer.info 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>renderer.info</span>
          <span id="toolbar-readout">calls 0</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/renderer-info-main.js"></script>
  </body>
</html>
