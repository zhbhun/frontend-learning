<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helper 开关</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">调试</a>
        <h1 id="page-title">Helper 开关</h1>

        <div class="control-group">
          <h2>显示</h2>
          <label class="switch-row">
            <input id="axes-input" type="checkbox" checked />
            <span>AxesHelper</span>
          </label>
          <label class="switch-row">
            <input id="grid-input" type="checkbox" checked />
            <span>GridHelper</span>
          </label>
          <label class="switch-row">
            <input id="box-input" type="checkbox" checked />
            <span>BoxHelper</span>
          </label>
          <label class="switch-row">
            <input id="camera-input" type="checkbox" checked />
            <span>CameraHelper</span>
          </label>
          <label class="switch-row">
            <input id="light-input" type="checkbox" checked />
            <span>DirectionalLightHelper</span>
          </label>
        </div>

        <div class="control-group">
          <h2>更新时机</h2>
          <label class="switch-row">
            <input id="update-input" type="checkbox" checked />
            <span>变换后调用 update()</span>
          </label>
          <label class="control-row">
            <span>旋转 Y</span>
            <output id="rotation-output">25°</output>
            <input id="rotation-input" type="range" min="-180" max="180" step="1" value="25" />
          </label>
          <label class="control-row">
            <span>相机 far</span>
            <output id="far-output">7.0</output>
            <input id="far-input" type="range" min="2" max="12" step="0.5" value="7" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>Helper</dt>
            <dd id="helper-readout">5 个可见</dd>
          </div>
          <div>
            <dt>状态</dt>
            <dd id="update-readout">已更新</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="Helper 开关预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>Helper Layer</span>
          <span id="toolbar-readout">updated</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/helper-toggle-main.js"></script>
  </body>
</html>
