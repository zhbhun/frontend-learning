<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HemisphereLight</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">明暗与阴影</a>
      <span>环境类光 / HemisphereLight</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="HemisphereLight 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>HemisphereLight</h1>
        <label>强度 <output id="hemisphere-intensity-value"></output><input id="hemisphere-intensity" type="range" min="0" max="2.8" step="0.05" value="1.15" /></label>
        <label class="color-row">天空色 <input id="sky-color" type="color" value="#8ec8ff" /></label>
        <label class="color-row">地面色 <input id="ground-color" type="color" value="#c28a4e" /></label>
        <label class="check-row"><input id="show-helper" type="checkbox" checked /> 显示 Helper</label>
        <dl class="metrics">
          <div><dt>sky</dt><dd id="sky-state"></dd></div>
          <div><dt>ground</dt><dd id="ground-state"></dd></div>
          <div><dt>helper</dt><dd id="helper-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/hemisphere-light-main.js"></script>
  </body>
</html>
