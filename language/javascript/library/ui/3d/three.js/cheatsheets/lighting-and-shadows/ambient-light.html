<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmbientLight</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">明暗与阴影</a>
      <span>环境类光 / AmbientLight</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="AmbientLight 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>AmbientLight</h1>
        <label>强度 <output id="ambient-intensity-value"></output><input id="ambient-intensity" type="range" min="0" max="2.4" step="0.05" value="0.85" /></label>
        <label class="color-row">颜色 <input id="ambient-color" type="color" value="#ffffff" /></label>
        <label class="check-row"><input id="show-basic" type="checkbox" checked /> 显示 MeshBasic 对照</label>
        <dl class="metrics">
          <div><dt>light</dt><dd id="ambient-state"></dd></div>
          <div><dt>材质</dt><dd id="material-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/ambient-light-main.js"></script>
  </body>
</html>
