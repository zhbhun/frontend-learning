<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpotLight</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">明暗与阴影</a>
      <span>局部光 / SpotLight</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="SpotLight 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>SpotLight</h1>
        <label>强度 <output id="spot-intensity-value"></output><input id="spot-intensity" type="range" min="0" max="80" step="1" value="42" /></label>
        <label>距离 <output id="spot-distance-value"></output><input id="spot-distance" type="range" min="0" max="12" step="0.2" value="8" /></label>
        <label>锥角 <output id="spot-angle-value"></output><input id="spot-angle" type="range" min="6" max="45" step="1" value="22" /></label>
        <label>半影 <output id="spot-penumbra-value"></output><input id="spot-penumbra" type="range" min="0" max="1" step="0.05" value="0.35" /></label>
        <label>衰减 <output id="spot-decay-value"></output><input id="spot-decay" type="range" min="0" max="4" step="0.1" value="2" /></label>
        <label>目标 X <output id="spot-target-x-value"></output><input id="spot-target-x" type="range" min="-2" max="2" step="0.05" value="0" /></label>
        <label class="check-row"><input id="show-helper" type="checkbox" checked /> 显示 Helper</label>
        <dl class="metrics">
          <div><dt>cone</dt><dd id="cone-state"></dd></div>
          <div><dt>target</dt><dd id="target-state"></dd></div>
          <div><dt>falloff</dt><dd id="falloff-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/spot-light-main.js"></script>
  </body>
</html>
