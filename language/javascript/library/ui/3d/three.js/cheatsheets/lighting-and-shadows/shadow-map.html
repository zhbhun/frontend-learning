<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阴影链路</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">明暗与阴影</a>
      <span>阴影链路</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="阴影链路预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Shadow Map</h1>
        <label>光源 X <output id="light-x-value"></output><input id="light-x" type="range" min="-5" max="5" step="0.1" value="-2.4" /></label>
        <label>阴影相机范围 <output id="camera-size-value"></output><input id="camera-size" type="range" min="2" max="9" step="0.1" value="5.2" /></label>
        <label>bias <output id="bias-value"></output><input id="bias" type="range" min="-0.01" max="0.01" step="0.0005" value="-0.001" /></label>
        <label>normalBias <output id="normal-bias-value"></output><input id="normal-bias" type="range" min="0" max="0.08" step="0.002" value="0.018" /></label>
        <label>radius <output id="radius-value"></output><input id="radius" type="range" min="1" max="8" step="0.25" value="2" /></label>
        <label class="check-row"><input id="renderer-shadow" type="checkbox" checked /> renderer.shadowMap</label>
        <label class="check-row"><input id="light-cast" type="checkbox" checked /> light.castShadow</label>
        <label class="check-row"><input id="mesh-cast" type="checkbox" checked /> mesh.castShadow</label>
        <label class="check-row"><input id="ground-receive" type="checkbox" checked /> ground.receiveShadow</label>
        <label class="check-row"><input id="show-helper" type="checkbox" checked /> 显示阴影相机</label>
        <dl class="metrics">
          <div><dt>renderer</dt><dd id="renderer-state"></dd></div>
          <div><dt>light</dt><dd id="light-state"></dd></div>
          <div><dt>caster</dt><dd id="caster-state"></dd></div>
          <div><dt>receiver</dt><dd id="receiver-state"></dd></div>
          <div><dt>shadow</dt><dd id="shadow-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/shadow-map-main.js"></script>
  </body>
</html>
