<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PointLight</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">明暗与阴影</a>
      <span>局部光 / PointLight</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="PointLight 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>PointLight</h1>
        <label>强度 <output id="point-intensity-value"></output><input id="point-intensity" type="range" min="0" max="60" step="1" value="24" /></label>
        <label>距离 <output id="point-distance-value"></output><input id="point-distance" type="range" min="0" max="10" step="0.2" value="5" /></label>
        <label>衰减 <output id="point-decay-value"></output><input id="point-decay" type="range" min="0" max="4" step="0.1" value="2" /></label>
        <label>光源 X <output id="point-x-value"></output><input id="point-x" type="range" min="-3.5" max="3.5" step="0.1" value="1.9" /></label>
        <label>光源 Z <output id="point-z-value"></output><input id="point-z" type="range" min="-3.5" max="3.5" step="0.1" value="1.2" /></label>
        <label class="check-row"><input id="show-helper" type="checkbox" checked /> 显示 Helper</label>
        <dl class="metrics">
          <div><dt>light</dt><dd id="light-state"></dd></div>
          <div><dt>position</dt><dd id="position-state"></dd></div>
          <div><dt>falloff</dt><dd id="falloff-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/point-light-main.js"></script>
  </body>
</html>
