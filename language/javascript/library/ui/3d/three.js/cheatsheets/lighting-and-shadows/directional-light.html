<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DirectionalLight</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">明暗与阴影</a>
      <span>方向类光 / DirectionalLight</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="DirectionalLight 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>DirectionalLight</h1>
        <label>强度 <output id="directional-intensity-value"></output><input id="directional-intensity" type="range" min="0" max="4" step="0.05" value="2.2" /></label>
        <label>光源 X <output id="light-x-value"></output><input id="light-x" type="range" min="-5" max="5" step="0.1" value="-2.8" /></label>
        <label>光源 Z <output id="light-z-value"></output><input id="light-z" type="range" min="-5" max="5" step="0.1" value="3.4" /></label>
        <label>目标 X <output id="target-x-value"></output><input id="target-x" type="range" min="-2" max="2" step="0.05" value="0" /></label>
        <label class="check-row"><input id="show-helper" type="checkbox" checked /> 显示 Helper</label>
        <dl class="metrics">
          <div><dt>position</dt><dd id="position-state"></dd></div>
          <div><dt>target</dt><dd id="target-state"></dd></div>
          <div><dt>材质</dt><dd id="material-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/directional-light-main.js"></script>
  </body>
</html>
