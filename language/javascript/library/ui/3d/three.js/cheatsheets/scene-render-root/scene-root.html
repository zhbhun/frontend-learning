<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>场景根</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Scene</a>
        <h1 id="page-title">场景根</h1>

        <div class="control-group">
          <h2>挂载对象</h2>
          <label class="switch-row">
            <input id="cube-input" type="checkbox" checked />
            <span>立方体</span>
          </label>
          <label class="switch-row">
            <input id="sphere-input" type="checkbox" checked />
            <span>球体</span>
          </label>
          <label class="switch-row">
            <input id="helper-input" type="checkbox" checked />
            <span>辅助轴</span>
          </label>
          <label class="switch-row">
            <input id="light-input" type="checkbox" checked />
            <span>主光源</span>
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>直接子级</dt>
            <dd id="children-readout">0</dd>
          </div>
          <div>
            <dt>Mesh</dt>
            <dd id="mesh-readout">0</dd>
          </div>
          <div>
            <dt>光源</dt>
            <dd id="light-readout">0</dd>
          </div>
          <div>
            <dt>遍历总数</dt>
            <dd id="traverse-readout">0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="场景根预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>renderer.render(scene, camera)</span>
          <span id="toolbar-readout">scene.children 0</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/scene-root-main.js"></script>
  </body>
</html>
