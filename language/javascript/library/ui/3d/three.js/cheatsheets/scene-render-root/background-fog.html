<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>背景与雾效</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Scene</a>
        <h1 id="page-title">背景与雾效</h1>

        <div class="control-group">
          <h2>场景状态</h2>
          <label class="control-row color-row">
            <span>背景色</span>
            <input id="background-input" type="color" value="#dbeafe" />
            <output id="background-output">#dbeafe</output>
          </label>
          <label class="switch-row">
            <input id="fog-input" type="checkbox" checked />
            <span>开启雾效</span>
          </label>
          <label class="control-row">
            <span>雾起点</span>
            <output id="near-output">4.0</output>
            <input id="near-input" type="range" min="1" max="10" step="0.1" value="4" />
          </label>
          <label class="control-row">
            <span>雾终点</span>
            <output id="far-output">13.0</output>
            <input id="far-input" type="range" min="5" max="22" step="0.1" value="13" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>背景</dt>
            <dd id="background-readout">#dbeafe</dd>
          </div>
          <div>
            <dt>雾</dt>
            <dd id="fog-readout">true</dd>
          </div>
          <div>
            <dt>near</dt>
            <dd id="near-readout">4.0</dd>
          </div>
          <div>
            <dt>far</dt>
            <dd id="far-readout">13.0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="背景与雾效预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>scene.background / scene.fog</span>
          <span id="toolbar-readout">Fog 4.0 - 13.0</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/background-fog-main.js"></script>
  </body>
</html>
