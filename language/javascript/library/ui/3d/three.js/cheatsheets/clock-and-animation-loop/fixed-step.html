<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixed Step</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">时间</a>
      <span>业务状态 / Fixed Step</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Fixed Step 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Fixed Step</h1>
        <label>
          业务频率
          <select id="step-rate">
            <option value="30">30 Hz</option>
            <option value="60" selected>60 Hz</option>
            <option value="120">120 Hz</option>
          </select>
        </label>
        <label>
          最大 delta
          <output id="max-delta-value"></output>
          <input id="max-delta" type="range" min="0.03" max="0.2" step="0.01" value="0.1" />
        </label>
        <button id="spike-button" type="button">模拟后台恢复</button>
        <dl class="metrics">
          <div><dt>raw delta</dt><dd id="raw-delta-state"></dd></div>
          <div><dt>capped</dt><dd id="capped-delta-state"></dd></div>
          <div><dt>本帧步数</dt><dd id="steps-state"></dd></div>
          <div><dt>业务时间</dt><dd id="simulation-state"></dd></div>
          <div><dt>accumulator</dt><dd id="accumulator-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/fixed-step-main.js"></script>
  </body>
</html>
