<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer Step</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">时间</a>
      <span>时间来源 / Timer Step</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Timer Step 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Timer Step</h1>
        <label>
          时间倍率
          <output id="timescale-value"></output>
          <input id="timescale" type="range" min="0" max="2.5" step="0.05" value="1" />
        </label>
        <label>
          摆动幅度
          <output id="amplitude-value"></output>
          <input id="amplitude" type="range" min="0" max="1.1" step="0.05" value="0.45" />
        </label>
        <dl class="metrics">
          <div><dt>delta</dt><dd id="delta-state"></dd></div>
          <div><dt>elapsed</dt><dd id="elapsed-state"></dd></div>
          <div><dt>二次读取</dt><dd id="second-read-state"></dd></div>
          <div><dt>timescale</dt><dd id="timescale-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/timer-step-main.js"></script>
  </body>
</html>
