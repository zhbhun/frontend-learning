<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timer Delta</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">时间</a>
      <span>时间来源 / Timer Delta</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Timer Delta 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Timer Delta</h1>
        <label>
          速度
          <output id="speed-value"></output>
          <input id="speed" type="range" min="0" max="4" step="0.1" value="1.6" />
        </label>
        <label class="check-row">
          <input id="frame-mode" type="checkbox" />
          每帧固定增量
        </label>
        <dl class="metrics">
          <div><dt>模式</dt><dd id="mode-state"></dd></div>
          <div><dt>delta</dt><dd id="delta-state"></dd></div>
          <div><dt>elapsed</dt><dd id="elapsed-state"></dd></div>
          <div><dt>rotation.y</dt><dd id="rotation-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/timer-delta-main.js"></script>
  </body>
</html>
