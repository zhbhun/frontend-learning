<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>透明与深度</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">材质</a>
      <span>透明与深度</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="透明与深度预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>渲染状态</h1>
        <label>透明度 <output id="opacity-value"></output><input id="opacity" type="range" min="0.1" max="1" step="0.05" value="0.55" /></label>
        <label>可见面
          <select id="side">
            <option value="front">FrontSide</option>
            <option value="back">BackSide</option>
            <option value="double" selected>DoubleSide</option>
          </select>
        </label>
        <label class="check-row"><input id="transparent" type="checkbox" checked /> transparent</label>
        <label class="check-row"><input id="depth-test" type="checkbox" checked /> depthTest</label>
        <label class="check-row"><input id="depth-write" type="checkbox" /> depthWrite</label>
        <label class="check-row"><input id="wireframe" type="checkbox" /> wireframe</label>
        <dl class="metrics">
          <div><dt>transparent</dt><dd id="transparent-state"></dd></div>
          <div><dt>opacity</dt><dd id="opacity-state"></dd></div>
          <div><dt>side</dt><dd id="side-state"></dd></div>
          <div><dt>depth</dt><dd id="depth-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/transparency-depth-main.js"></script>
  </body>
</html>
