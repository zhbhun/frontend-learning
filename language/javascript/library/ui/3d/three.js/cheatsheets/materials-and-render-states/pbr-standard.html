<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standard 参数</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">材质</a>
      <span>Standard 参数</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="MeshStandardMaterial 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>PBR 表面</h1>
        <label>金属度 <output id="metalness-value"></output><input id="metalness" type="range" min="0" max="1" step="0.01" value="0.18" /></label>
        <label>粗糙度 <output id="roughness-value"></output><input id="roughness" type="range" min="0.05" max="1" step="0.01" value="0.42" /></label>
        <label>颜色 <input id="color" type="color" value="#2f83d8" /></label>
        <label class="check-row"><input id="flat-shading" type="checkbox" /> 平面着色</label>
        <dl class="metrics">
          <div><dt>material</dt><dd id="material-type"></dd></div>
          <div><dt>metalness</dt><dd id="metalness-state"></dd></div>
          <div><dt>roughness</dt><dd id="roughness-state"></dd></div>
          <div><dt>needsUpdate</dt><dd id="update-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/pbr-standard-main.js"></script>
  </body>
</html>
