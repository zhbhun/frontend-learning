<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>材质家族</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">材质</a>
      <span>材质家族</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="材质家族预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>常用材质</h1>
        <label>光照强度 <output id="light-intensity-value"></output><input id="light-intensity" type="range" min="0" max="3" step="0.1" value="1.4" /></label>
        <label>光源 X <output id="light-x-value"></output><input id="light-x" type="range" min="-5" max="5" step="0.2" value="-2.6" /></label>
        <label>高光强度 <output id="shininess-value"></output><input id="shininess" type="range" min="5" max="120" step="1" value="55" /></label>
        <label class="check-row"><input id="wireframe" type="checkbox" /> 线框</label>
        <dl class="metrics">
          <div><dt>Basic</dt><dd id="basic-state"></dd></div>
          <div><dt>Normal</dt><dd id="normal-state"></dd></div>
          <div><dt>Lambert</dt><dd id="lambert-state"></dd></div>
          <div><dt>Phong</dt><dd id="phong-state"></dd></div>
          <div><dt>Standard</dt><dd id="standard-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/material-family-main.js"></script>
  </body>
</html>
