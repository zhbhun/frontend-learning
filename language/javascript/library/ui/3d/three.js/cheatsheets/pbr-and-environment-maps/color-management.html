<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Management</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">PBR</a>
      <span>观察颜色贴图、数据贴图和 renderer 输出的颜色管理</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="颜色管理预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="颜色管理控制面板">
        <h1>Color Management</h1>
        <label>
          颜色贴图 colorSpace
          <select id="color-map-space">
            <option value="srgb">SRGBColorSpace</option>
            <option value="linear">LinearSRGBColorSpace</option>
            <option value="none">NoColorSpace</option>
          </select>
        </label>
        <label>
          输出 colorSpace
          <select id="output-color-space">
            <option value="srgb">SRGBColorSpace</option>
            <option value="linear">LinearSRGBColorSpace</option>
          </select>
        </label>
        <label>
          toneMapping
          <select id="tone-mapping">
            <option value="aces">ACESFilmicToneMapping</option>
            <option value="reinhard">ReinhardToneMapping</option>
            <option value="none">NoToneMapping</option>
          </select>
        </label>
        <label>
          曝光
          <span class="range-field">
            <input id="exposure" type="range" min="0.4" max="1.8" step="0.05" value="1" />
            <output id="exposure-value">1.00</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>颜色贴图</dt><dd id="color-map-state">-</dd></div>
          <div><dt>数据贴图</dt><dd id="data-map-state">-</dd></div>
          <div><dt>renderer</dt><dd id="renderer-state">-</dd></div>
          <div><dt>观察</dt><dd id="compare-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/color-management-main.js"></script>
  </body>
</html>
