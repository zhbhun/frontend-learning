<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeshPhysicalMaterial</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">PBR</a>
      <span>最小观察 clearcoat 与 transmission</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="MeshPhysicalMaterial 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="MeshPhysicalMaterial 控制面板">
        <h1>Physical 参数</h1>
        <label>
          clearcoat
          <span class="range-field">
            <input id="clearcoat" type="range" min="0" max="1" step="0.01" value="0.85" />
            <output id="clearcoat-value">0.85</output>
          </span>
        </label>
        <label>
          clearcoatRoughness
          <span class="range-field">
            <input id="clearcoat-roughness" type="range" min="0" max="0.6" step="0.01" value="0.08" />
            <output id="clearcoat-roughness-value">0.08</output>
          </span>
        </label>
        <label>
          transmission
          <span class="range-field">
            <input id="transmission" type="range" min="0" max="1" step="0.01" value="0.72" />
            <output id="transmission-value">0.72</output>
          </span>
        </label>
        <label>
          thickness
          <span class="range-field">
            <input id="thickness" type="range" min="0" max="1.2" step="0.02" value="0.55" />
            <output id="thickness-value">0.55</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>clearcoat</dt><dd id="clearcoat-state">-</dd></div>
          <div><dt>transmission</dt><dd id="transmission-state">-</dd></div>
          <div><dt>material</dt><dd id="material-state">-</dd></div>
          <div><dt>观察</dt><dd id="compare-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/physical-material-main.js"></script>
  </body>
</html>
