<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environment Map</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">PBR</a>
      <span>区分 scene.environment 与 scene.background</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="环境贴图预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="环境贴图控制面板">
        <h1>Environment Map</h1>
        <label>
          环境贴图
          <select id="environment-mode">
            <option value="room">RoomEnvironment PMREM</option>
            <option value="none">无 environment</option>
          </select>
        </label>
        <label>
          背景
          <select id="background-mode">
            <option value="color">纯色 background</option>
            <option value="texture">CanvasTexture background</option>
          </select>
        </label>
        <label>
          环境强度
          <span class="range-field">
            <input id="env-intensity" type="range" min="0" max="2" step="0.05" value="1" />
            <output id="env-intensity-value">1.00</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>environment</dt><dd id="environment-state">-</dd></div>
          <div><dt>background</dt><dd id="background-state">-</dd></div>
          <div><dt>material</dt><dd id="material-state">-</dd></div>
          <div><dt>观察</dt><dd id="compare-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/environment-map-main.js"></script>
  </body>
</html>
