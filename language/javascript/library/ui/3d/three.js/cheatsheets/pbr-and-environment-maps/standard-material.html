<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeshStandardMaterial</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">PBR</a>
      <span>观察 color、metalness、roughness 如何改变同一个表面</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="MeshStandardMaterial 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="MeshStandardMaterial 控制面板">
        <h1>Standard 参数</h1>
        <label>
          基础颜色
          <input id="base-color" type="color" value="#2f83d8" />
        </label>
        <label>
          金属度
          <span class="range-field">
            <input id="metalness" type="range" min="0" max="1" step="0.01" value="0.18" />
            <output id="metalness-value">0.18</output>
          </span>
        </label>
        <label>
          粗糙度
          <span class="range-field">
            <input id="roughness" type="range" min="0.04" max="1" step="0.01" value="0.42" />
            <output id="roughness-value">0.42</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>material</dt><dd id="material-state">-</dd></div>
          <div><dt>color</dt><dd id="color-state">-</dd></div>
          <div><dt>metalness</dt><dd id="metalness-state">-</dd></div>
          <div><dt>roughness</dt><dd id="roughness-state">-</dd></div>
          <div><dt>观察</dt><dd id="compare-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/standard-material-main.js"></script>
  </body>
</html>
