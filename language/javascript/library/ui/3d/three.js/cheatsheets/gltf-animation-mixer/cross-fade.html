<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cross Fade</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">动画</a>
      <span>切换混合 / Cross Fade</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Cross Fade 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Cross Fade</h1>
        <label>
          切换到
          <select id="target-action">
            <option value="">加载中</option>
          </select>
        </label>
        <label>
          淡入时长
          <output id="fade-duration-value"></output>
          <input id="fade-duration" type="range" min="0" max="2" step="0.1" value="0.7" />
        </label>
        <label class="check-row">
          <input id="warp-time" type="checkbox" checked />
          同步片段速度
        </label>
        <button id="fade-button" type="button">crossFadeTo()</button>
        <dl class="metrics">
          <div><dt>active</dt><dd id="active-state"></dd></div>
          <div><dt>weights</dt><dd id="weights-state"></dd></div>
          <div><dt>mixer</dt><dd id="mixer-time-state"></dd></div>
          <div><dt>scheduled</dt><dd id="scheduled-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/cross-fade-main.js"></script>
  </body>
</html>
