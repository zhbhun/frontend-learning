<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimationAction</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">动画</a>
      <span>状态控制 / AnimationAction</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="AnimationAction 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>AnimationAction</h1>
        <label>
          动画片段
          <select id="clip-name">
            <option value="">加载中</option>
          </select>
        </label>
        <label>
          速度倍率
          <output id="time-scale-value"></output>
          <input id="time-scale" type="range" min="-1.5" max="2.5" step="0.1" value="1" />
        </label>
        <label>
          循环模式
          <select id="loop-mode">
            <option value="LoopRepeat">LoopRepeat</option>
            <option value="LoopOnce">LoopOnce</option>
            <option value="LoopPingPong">LoopPingPong</option>
          </select>
        </label>
        <label>
          重复次数
          <output id="repetitions-value"></output>
          <input id="repetitions" type="range" min="1" max="5" step="1" value="2" />
        </label>
        <label class="check-row">
          <input id="paused" type="checkbox" />
          暂停 action
        </label>
        <label class="check-row">
          <input id="clamp-finished" type="checkbox" />
          停在最后一帧
        </label>
        <button id="restart-action" type="button">reset().play()</button>
        <dl class="metrics">
          <div><dt>action</dt><dd id="action-state"></dd></div>
          <div><dt>time</dt><dd id="time-state"></dd></div>
          <div><dt>effective</dt><dd id="effective-state"></dd></div>
          <div><dt>loop</dt><dd id="loop-state"></dd></div>
          <div><dt>event</dt><dd id="event-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/action-controls-main.js"></script>
  </body>
</html>
