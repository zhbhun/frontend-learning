<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimationClip</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">动画</a>
      <span>播放链路 / AnimationClip</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="AnimationClip 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>AnimationClip</h1>
        <label>
          动画片段
          <select id="clip-name">
            <option value="">加载中</option>
          </select>
        </label>
        <button id="restart-action" type="button">重新播放</button>
        <dl class="metrics">
          <div><dt>加载</dt><dd id="load-state"></dd></div>
          <div><dt>clip</dt><dd id="clip-state"></dd></div>
          <div><dt>tracks</dt><dd id="tracks-state"></dd></div>
          <div><dt>mixer</dt><dd id="mixer-time-state"></dd></div>
          <div><dt>action</dt><dd id="action-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/clip-playback-main.js"></script>
  </body>
</html>
