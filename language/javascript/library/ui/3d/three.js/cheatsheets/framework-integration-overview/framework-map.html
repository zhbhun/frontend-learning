<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>框架映射</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">框架</a>
      <span>vanilla / R3F / TresJS 概念映射</span>
    </header>

    <main class="lesson-shell">
      <section class="viewport map-viewport">
        <div id="map-host" class="stage-frame map-stage" aria-label="框架映射观察区域"></div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">概念映射</h1>

        <div class="segmented three" role="group" aria-label="框架选型">
          <button id="vanilla-profile" type="button" data-profile="vanilla" aria-pressed="true">vanilla</button>
          <button id="r3f-profile" type="button" data-profile="r3f" aria-pressed="false">R3F</button>
          <button id="tres-profile" type="button" data-profile="tres" aria-pressed="false">TresJS</button>
        </div>

        <dl class="metrics mapping">
          <div>
            <dt>定位</dt>
            <dd id="profile-position">adapter 边界</dd>
          </div>
          <div>
            <dt>创建</dt>
            <dd id="profile-create">mount 中显式 new three.js 对象</dd>
          </div>
          <div>
            <dt>更新</dt>
            <dd id="profile-update">update(props) 修改稳定对象</dd>
          </div>
          <div>
            <dt>每帧</dt>
            <dd id="profile-loop">adapter 拥有 requestAnimationFrame</dd>
          </div>
          <div>
            <dt>事件</dt>
            <dd id="profile-events">canvas listener 自己转成业务事件</dd>
          </div>
          <div>
            <dt>资源</dt>
            <dd id="profile-resource">unmount 中 dispose 拥有的资源</dd>
          </div>
          <div>
            <dt>适合</dt>
            <dd id="profile-fit">小面积嵌入、已有 vanilla 场景、跨框架复用</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/framework-map-main.js"></script>
  </body>
</html>
