<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>命令式 Adapter</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">框架</a>
      <span>mount / update / unmount adapter</span>
    </header>

    <main class="lesson-shell">
      <section class="viewport">
        <div id="adapter-host" class="stage-frame" aria-label="命令式 adapter 挂载区域"></div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">命令式 adapter</h1>

        <div class="button-row">
          <button id="mount-button" type="button">挂载</button>
          <button id="update-button" type="button">更新 props</button>
          <button id="unmount-button" type="button">卸载</button>
        </div>

        <label>
          <span>主题颜色</span>
          <select id="color-select">
            <option value="#28747c">青绿</option>
            <option value="#c96332">珊瑚</option>
            <option value="#6d5bd0">紫色</option>
          </select>
        </label>

        <label>
          <span>旋转速度</span>
          <output id="speed-output">0.80</output>
          <input id="speed-input" type="range" min="0" max="2.4" step="0.1" value="0.8" />
        </label>

        <label class="checkbox-row">
          <input id="wireframe-input" type="checkbox" />
          <span>线框材质</span>
        </label>

        <dl class="metrics">
          <div>
            <dt>状态</dt>
            <dd id="adapter-state">未挂载</dd>
          </div>
          <div>
            <dt>props 更新</dt>
            <dd id="prop-updates">0</dd>
          </div>
          <div>
            <dt>帧数</dt>
            <dd id="frame-count">0</dd>
          </div>
          <div>
            <dt>画布尺寸</dt>
            <dd id="canvas-size">0 x 0</dd>
          </div>
          <div>
            <dt>释放资源</dt>
            <dd id="disposed-resources">geometry 0 / material 0 / texture 0</dd>
          </div>
          <div>
            <dt>最后动作</dt>
            <dd id="adapter-action">初始化</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/imperative-adapter-main.js"></script>
  </body>
</html>
