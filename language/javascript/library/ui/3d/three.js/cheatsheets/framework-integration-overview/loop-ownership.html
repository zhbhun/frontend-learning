<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Loop 所有权</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">框架</a>
      <span>requestAnimationFrame 与 UI state 更新边界</span>
    </header>

    <main class="lesson-shell">
      <section class="viewport">
        <div id="loop-host" class="stage-frame" aria-label="渲染循环所有权观察区域"></div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">循环所有权</h1>

        <div class="segmented" role="group" aria-label="UI 更新频率">
          <button id="throttled-mode" type="button" data-mode="throttled" aria-pressed="true">低频 UI</button>
          <button id="every-frame-mode" type="button" data-mode="every-frame" aria-pressed="false">每帧 UI</button>
        </div>

        <div class="button-row">
          <button id="start-button" type="button">开始</button>
          <button id="pause-button" type="button">暂停</button>
          <button id="reset-loop-button" type="button">重置</button>
        </div>

        <label>
          <span>动画速度</span>
          <output id="loop-speed-output">1.00</output>
          <input id="loop-speed-input" type="range" min="0.2" max="2.4" step="0.1" value="1" />
        </label>

        <label>
          <span>UI 快照间隔</span>
          <output id="ui-interval-output">250 ms</output>
          <input id="ui-interval-input" type="range" min="80" max="800" step="10" value="250" />
        </label>

        <dl class="metrics">
          <div>
            <dt>循环状态</dt>
            <dd id="loop-state">运行中</dd>
          </div>
          <div>
            <dt>3D 帧数</dt>
            <dd id="loop-frames">0</dd>
          </div>
          <div>
            <dt>UI render</dt>
            <dd id="ui-renders">0</dd>
          </div>
          <div>
            <dt>业务状态</dt>
            <dd id="ui-state">等待首帧</dd>
          </div>
          <div>
            <dt>loop owner</dt>
            <dd id="loop-owner">adapter</dd>
          </div>
          <div>
            <dt>最后动作</dt>
            <dd id="loop-action">初始化</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/loop-ownership-main.js"></script>
  </body>
</html>
