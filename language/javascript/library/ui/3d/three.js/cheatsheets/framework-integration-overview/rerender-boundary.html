<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Re-render 边界</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">框架</a>
      <span>re-render 不等于重建 three.js 资源</span>
    </header>

    <main class="lesson-shell">
      <section class="viewport">
        <div id="rerender-host" class="stage-frame" aria-label="re-render 资源边界观察区域"></div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">模拟 re-render</h1>

        <div class="segmented" role="group" aria-label="re-render 模式">
          <button id="stable-mode" type="button" data-mode="stable" aria-pressed="true">稳定引用</button>
          <button id="recreate-mode" type="button" data-mode="recreate" aria-pressed="false">重复创建</button>
        </div>

        <div class="button-row">
          <button id="render-once-button" type="button">render 一次</button>
          <button id="render-many-button" type="button">render 20 次</button>
          <button id="reset-button" type="button">重置</button>
        </div>

        <label>
          <span>props 版本</span>
          <output id="version-output">0</output>
          <input id="version-input" type="range" min="0" max="12" step="1" value="0" />
        </label>

        <dl class="metrics">
          <div>
            <dt>模式</dt>
            <dd id="mode-label">稳定引用</dd>
          </div>
          <div>
            <dt>UI render</dt>
            <dd id="framework-renders">0</dd>
          </div>
          <div>
            <dt>创建资源</dt>
            <dd id="created-resources">geometry 1 / material 1</dd>
          </div>
          <div>
            <dt>释放资源</dt>
            <dd id="rerender-disposals">geometry 0 / material 0</dd>
          </div>
          <div>
            <dt>活动资源</dt>
            <dd id="active-resources">等待首帧</dd>
          </div>
          <div>
            <dt>最后动作</dt>
            <dd id="rerender-action">初始化</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/rerender-boundary-main.js"></script>
  </body>
</html>
