<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DirectionalLightHelper</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Helper</a>
        <h1 id="page-title">DirectionalLightHelper</h1>

        <div class="control-group">
          <h2>方向光目标</h2>
          <label class="control-row">
            <span>光源 X</span>
            <output id="light-x-output">3.0</output>
            <input id="light-x-input" type="range" min="-4" max="4" step="0.1" value="3" />
          </label>
          <label class="control-row">
            <span>目标 X</span>
            <output id="target-x-output">0.0</output>
            <input id="target-x-input" type="range" min="-2" max="2" step="0.1" value="0" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>光源位置</dt>
            <dd id="light-position-readout">3, 4, 2</dd>
          </div>
          <div>
            <dt>目标位置</dt>
            <dd id="target-position-readout">0, 0.45, 0</dd>
          </div>
          <div>
            <dt>方向</dt>
            <dd id="direction-readout">0, 0, 0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="DirectionalLightHelper 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>DirectionalLightHelper</span>
          <span id="toolbar-readout">light x 3.0</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/directional-light-helper-main.js"></script>
  </body>
</html>
