<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridHelper</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Helper</a>
        <h1 id="page-title">GridHelper</h1>

        <div class="control-group">
          <h2>网格尺寸</h2>
          <label class="control-row">
            <span>size</span>
            <output id="grid-size-output">8</output>
            <input id="grid-size-input" type="range" min="4" max="20" step="1" value="8" />
          </label>
          <label class="control-row">
            <span>divisions</span>
            <output id="divisions-output">8</output>
            <input id="divisions-input" type="range" min="2" max="20" step="1" value="8" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>总尺寸</dt>
            <dd id="size-readout">8</dd>
          </div>
          <div>
            <dt>分段数</dt>
            <dd id="divisions-readout">8</dd>
          </div>
          <div>
            <dt>每格</dt>
            <dd id="cell-readout">1.00</dd>
          </div>
          <div>
            <dt>范围</dt>
            <dd id="range-readout">-4.0 到 4.0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="GridHelper 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>GridHelper</span>
          <span id="toolbar-readout">cell 1.00</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/grid-helper-main.js"></script>
  </body>
</html>
