<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CameraHelper</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Helper</a>
        <h1 id="page-title">CameraHelper</h1>

        <div class="control-group">
          <h2>透视相机</h2>
          <label class="control-row">
            <span>fov</span>
            <output id="fov-output">40°</output>
            <input id="fov-input" type="range" min="22" max="80" step="1" value="40" />
          </label>
          <label class="control-row">
            <span>near</span>
            <output id="near-output">0.5</output>
            <input id="near-input" type="range" min="0.1" max="3" step="0.1" value="0.5" />
          </label>
          <label class="control-row">
            <span>far</span>
            <output id="far-output">8.0</output>
            <input id="far-input" type="range" min="4" max="14" step="0.1" value="8" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>裁剪范围</dt>
            <dd id="range-readout">0.5 到 8.0</dd>
          </div>
          <div>
            <dt>更新</dt>
            <dd id="update-readout">updateProjectionMatrix() + helper.update()</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="CameraHelper 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>CameraHelper</span>
          <span id="toolbar-readout">fov 40°</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/camera-helper-main.js"></script>
  </body>
</html>
