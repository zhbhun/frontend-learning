<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AxesHelper</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Helper</a>
        <h1 id="page-title">AxesHelper</h1>

        <div class="control-group">
          <h2>局部坐标轴</h2>
          <label class="control-row">
            <span>轴长度</span>
            <output id="helper-size-output">1.7</output>
            <input id="helper-size-input" type="range" min="0.6" max="3" step="0.1" value="1.7" />
          </label>
          <label class="control-row">
            <span>目标旋转 Y</span>
            <output id="rotation-output">30°</output>
            <input id="rotation-input" type="range" min="-180" max="180" step="1" value="30" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>size</dt>
            <dd id="size-readout">1.7</dd>
          </div>
          <div>
            <dt>挂载</dt>
            <dd id="mount-readout">target.add(helper)</dd>
          </div>
          <div>
            <dt>颜色</dt>
            <dd>X 红 / Y 绿 / Z 蓝</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="AxesHelper 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>AxesHelper</span>
          <span id="toolbar-readout">size 1.7</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/axes-helper-main.js"></script>
  </body>
</html>
