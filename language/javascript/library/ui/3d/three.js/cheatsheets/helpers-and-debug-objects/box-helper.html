<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoxHelper</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Helper</a>
        <h1 id="page-title">BoxHelper</h1>

        <div class="control-group">
          <h2>目标变换</h2>
          <label class="switch-row">
            <input id="update-helper-input" type="checkbox" checked />
            <span>调用 update()</span>
          </label>
          <label class="control-row">
            <span>旋转 Y</span>
            <output id="rotation-output">30°</output>
            <input id="rotation-input" type="range" min="-180" max="180" step="1" value="30" />
          </label>
          <label class="control-row">
            <span>缩放</span>
            <output id="scale-output">1.00</output>
            <input id="scale-input" type="range" min="0.5" max="1.8" step="0.05" value="1" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>世界尺寸</dt>
            <dd id="box-size-readout">0, 0, 0</dd>
          </div>
          <div>
            <dt>线框状态</dt>
            <dd id="helper-readout">已调用 update()</dd>
          </div>
          <div>
            <dt>对齐</dt>
            <dd id="alignment-readout">世界轴对齐</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="BoxHelper 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>BoxHelper</span>
          <span id="toolbar-readout">updated</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/box-helper-main.js"></script>
  </body>
</html>
