<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controller 输入</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebXR</a>
      <span>getController、getControllerGrip、select、squeeze、Raycaster</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport">
        <canvas id="stage"></canvas>
      </section>
      <aside class="panel">
        <h1>Controller 输入</h1>
        <div id="xr-button-slot" class="button-slot"></div>
        <label>
          fallback 射线角度
          <output id="ray-output">0°</output>
          <input id="ray-angle" type="range" min="-36" max="36" value="0" step="1" />
        </label>
        <div class="button-row">
          <button id="simulate-select-start" type="button">模拟 selectstart</button>
          <button id="simulate-select-end" type="button">模拟 selectend</button>
          <button id="simulate-squeeze" type="button">模拟 squeeze</button>
        </div>
        <dl class="metrics">
          <div>
            <dt>输入来源</dt>
            <dd id="input-source-state">fallback 射线</dd>
          </div>
          <div>
            <dt>最近事件</dt>
            <dd id="event-state">等待输入</dd>
          </div>
          <div>
            <dt>命中对象</dt>
            <dd id="hit-state">无</dd>
          </div>
          <div>
            <dt>select</dt>
            <dd id="select-state">未按下</dd>
          </div>
          <div>
            <dt>squeeze</dt>
            <dd id="squeeze-state">0</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/controller-input-main.js"></script>
  </body>
</html>
