<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRButton 和循环</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebXR</a>
      <span>renderer.xr.enabled、VRButton、setAnimationLoop</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport">
        <canvas id="stage"></canvas>
      </section>
      <aside class="panel">
        <h1>VRButton 和循环</h1>
        <div id="xr-button-slot" class="button-slot"></div>
        <label>
          旋转速度
          <output id="speed-output">1.00</output>
          <input id="speed-input" type="range" min="0" max="2.5" value="1" step="0.05" />
        </label>
        <dl class="metrics">
          <div>
            <dt>XR 开关</dt>
            <dd id="xr-enabled-state">未启用</dd>
          </div>
          <div>
            <dt>Session</dt>
            <dd id="presenting-state">检测中</dd>
          </div>
          <div>
            <dt>帧来源</dt>
            <dd id="loop-source-state">普通 canvas</dd>
          </div>
          <div>
            <dt>帧计数</dt>
            <dd id="frame-state">0</dd>
          </div>
          <div>
            <dt>画布尺寸</dt>
            <dd id="size-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/vr-button-loop-main.js"></script>
  </body>
</html>
