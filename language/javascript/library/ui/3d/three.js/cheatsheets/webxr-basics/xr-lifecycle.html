<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session 生命周期</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebXR</a>
      <span>进入、退出、暂停、恢复、dispose</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport">
        <canvas id="stage"></canvas>
      </section>
      <aside class="panel">
        <h1>Session 生命周期</h1>
        <div id="xr-button-slot" class="button-slot"></div>
        <div class="button-row">
          <button id="simulate-enter" type="button">模拟进入</button>
          <button id="simulate-exit" type="button">模拟退出</button>
          <button id="pause-loop" type="button">暂停循环</button>
          <button id="resume-loop" type="button">恢复循环</button>
          <button id="dispose-scene" type="button">释放资源</button>
        </div>
        <dl class="metrics">
          <div>
            <dt>生命周期</dt>
            <dd id="lifecycle-state">已创建</dd>
          </div>
          <div>
            <dt>Session</dt>
            <dd id="session-state">无</dd>
          </div>
          <div>
            <dt>循环</dt>
            <dd id="loop-state">运行中</dd>
          </div>
          <div>
            <dt>尺寸来源</dt>
            <dd id="size-owner-state">页面容器</dd>
          </div>
          <div>
            <dt>资源</dt>
            <dd id="resource-state">geometry/material/renderer 已创建</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/xr-lifecycle-main.js"></script>
  </body>
</html>
