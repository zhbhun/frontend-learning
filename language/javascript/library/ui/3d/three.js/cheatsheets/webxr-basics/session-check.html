<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session 能力检测</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">WebXR</a>
      <span>secure context、navigator.xr、immersive-vr</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport">
        <canvas id="stage"></canvas>
      </section>
      <aside class="panel">
        <h1>Session 能力检测</h1>
        <button id="check-again" type="button">重新检测</button>
        <dl class="metrics">
          <div>
            <dt>安全上下文</dt>
            <dd id="secure-state">检测中</dd>
          </div>
          <div>
            <dt>navigator.xr</dt>
            <dd id="navigator-state">检测中</dd>
          </div>
          <div>
            <dt>immersive-vr</dt>
            <dd id="session-state">检测中</dd>
          </div>
          <div>
            <dt>fallback</dt>
            <dd id="fallback-state">普通 WebGL 场景保持可见</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/session-check-main.js"></script>
  </body>
</html>
