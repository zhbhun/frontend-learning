<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Errors</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.2 模型</a>
      <span>区分主文件缺失、外部资源缺失和恢复加载</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="错误状态预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="错误处理控制面板">
        <h1>加载错误</h1>
        <label>
          情况
          <select id="error-case">
            <option value="missingTopLevel">主文件不存在</option>
            <option value="missingBuffer">外部 .bin 丢失</option>
            <option value="valid">恢复加载有效 GLB</option>
          </select>
        </label>
        <button id="run-case" type="button">运行</button>
        <button id="retry-valid" type="button">加载有效模型</button>
        <dl class="metrics">
          <div>
            <dt>状态</dt>
            <dd id="load-state">等待运行</dd>
          </div>
          <div>
            <dt>管理器</dt>
            <dd id="manager-state">-</dd>
          </div>
          <div>
            <dt>失败 URL</dt>
            <dd id="last-error-url">-</dd>
          </div>
          <div>
            <dt>错误</dt>
            <dd id="error-state">-</dd>
          </div>
          <div>
            <dt>恢复</dt>
            <dd id="recovery-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/loading-errors-main.js"></script>
  </body>
</html>
