<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLTFLoader</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.2 模型</a>
      <span>加载 .glb、.gltf 和本课多节点模型</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="模型预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="GLTFLoader 控制面板">
        <h1>GLTFLoader</h1>
        <label>
          模型来源
          <select id="asset-kind">
            <option value="glb">Box.glb</option>
            <option value="gltf">Box.gltf + Box0.bin</option>
            <option value="multiNode">MultiNodeBox.gltf</option>
          </select>
        </label>
        <label class="check-row">
          <input id="auto-rotate" type="checkbox" checked />
          自动旋转
        </label>
        <button id="reload-model" type="button">重新加载</button>
        <dl class="metrics">
          <div>
            <dt>状态</dt>
            <dd id="load-state">等待加载</dd>
          </div>
          <div>
            <dt>管理器</dt>
            <dd id="manager-state">-</dd>
          </div>
          <div>
            <dt>URL</dt>
            <dd id="asset-url">-</dd>
          </div>
          <div>
            <dt>场景</dt>
            <dd id="scene-state">-</dd>
          </div>
          <div>
            <dt>网格</dt>
            <dd id="mesh-state">-</dd>
          </div>
          <div>
            <dt>动画</dt>
            <dd id="animation-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/gltf-loader-main.js"></script>
  </body>
</html>
