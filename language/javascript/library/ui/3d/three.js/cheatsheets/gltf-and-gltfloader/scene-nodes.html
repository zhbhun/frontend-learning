<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scene Nodes</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">3.2 模型</a>
      <span>遍历 glTF 节点、按名称选择对象并计算包围盒</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="节点预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="节点控制面板">
        <h1>节点与尺寸</h1>
        <label>
          选中节点
          <select id="node-name"></select>
        </label>
        <label class="check-row">
          <input id="show-bounds" type="checkbox" checked />
          显示包围盒
        </label>
        <button id="frame-selected" type="button">定位节点</button>
        <dl class="metrics">
          <div>
            <dt>节点树</dt>
            <dd id="node-tree">加载中</dd>
          </div>
          <div>
            <dt>选中</dt>
            <dd id="selected-state">-</dd>
          </div>
          <div>
            <dt>尺寸</dt>
            <dd id="bounds-state">-</dd>
          </div>
          <div>
            <dt>相机</dt>
            <dd id="camera-state">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/scene-nodes-main.js"></script>
  </body>
</html>
