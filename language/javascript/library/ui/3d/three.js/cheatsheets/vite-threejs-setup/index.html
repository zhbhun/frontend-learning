<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Three.js Setup Check</title>
  </head>
  <body>
    <div class="layout">
      <section class="status-panel" aria-labelledby="lesson-title">
        <h1 id="lesson-title">Vite + Three.js 环境检查</h1>

        <dl class="version-grid">
          <div>
            <dt>THREE.REVISION</dt>
            <dd data-three-revision>检查中</dd>
          </div>
          <div>
            <dt>包版本</dt>
            <dd>three@0.185.1</dd>
          </div>
          <div>
            <dt>开发服务器</dt>
            <dd>Vite</dd>
          </div>
        </dl>

        <ul class="checks" id="checks" aria-live="polite"></ul>
      </section>

      <main class="renderer-panel" aria-label="Three.js renderer preview">
        <div class="renderer-toolbar">
          <span>WebGLRenderer 画布</span>
          <span data-renderer-size>0 x 0</span>
        </div>
        <div class="renderer-stage" id="renderer-stage"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
