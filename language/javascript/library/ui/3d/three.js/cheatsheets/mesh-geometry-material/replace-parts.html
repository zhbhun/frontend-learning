<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>替换 Mesh 部件</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Mesh</a>
        <h1 id="page-title">替换部件</h1>

        <div class="control-group">
          <h2>部件</h2>
          <label class="select-row">
            <span>形状</span>
            <select id="geometry-input">
              <option value="box">盒子</option>
              <option value="sphere">球体</option>
              <option value="cone">圆锥</option>
              <option value="torus">圆环</option>
            </select>
          </label>
          <label class="select-row">
            <span>表面</span>
            <select id="material-input">
              <option value="standard">受光材质</option>
              <option value="normal">法线材质</option>
              <option value="basic">基础材质</option>
            </select>
          </label>
          <label class="control-row">
            <span>透明度</span>
            <output id="opacity-output">1.00</output>
            <input id="opacity-input" type="range" min="0.25" max="1" step="0.05" value="1" />
          </label>
          <label class="switch-row">
            <input id="animate-input" type="checkbox" checked />
            <span>自动旋转</span>
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>geometry</dt>
            <dd id="geometry-readout">BoxGeometry</dd>
          </div>
          <div>
            <dt>material</dt>
            <dd id="material-readout">MeshStandardMaterial</dd>
          </div>
          <div>
            <dt>顶点</dt>
            <dd id="vertex-readout">0</dd>
          </div>
          <div>
            <dt>透明</dt>
            <dd id="opacity-readout">1.00</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="替换 Mesh 部件预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>mesh.geometry / mesh.material</span>
          <span id="toolbar-readout">BoxGeometry</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/replace-parts-main.js"></script>
  </body>
</html>
