<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesh 组成关系</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Mesh</a>
        <h1 id="page-title">组成关系</h1>

        <div class="control-group">
          <h2>显示</h2>
          <label class="switch-row">
            <input id="wireframe-input" type="checkbox" />
            <span>线框材质</span>
          </label>
          <label class="switch-row">
            <input id="normal-input" type="checkbox" />
            <span>法线材质</span>
          </label>
          <label class="switch-row">
            <input id="box-input" type="checkbox" checked />
            <span>包围盒</span>
          </label>
          <label class="control-row">
            <span>旋转</span>
            <output id="rotation-output">35°</output>
            <input id="rotation-input" type="range" min="-180" max="180" step="1" value="35" />
          </label>
          <label class="control-row">
            <span>缩放</span>
            <output id="scale-output">1.00</output>
            <input id="scale-input" type="range" min="0.5" max="2" step="0.05" value="1" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>geometry</dt>
            <dd id="geometry-readout">BoxGeometry</dd>
          </div>
          <div>
            <dt>material</dt>
            <dd id="material-readout">MeshStandardMaterial</dd>
          </div>
          <div>
            <dt>顶点</dt>
            <dd id="vertex-readout">0</dd>
          </div>
          <div>
            <dt>世界尺寸</dt>
            <dd id="size-readout">0, 0, 0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="Mesh 组成关系预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>new THREE.Mesh(geometry, material)</span>
          <span id="toolbar-readout">Mesh</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/mesh-parts-main.js"></script>
  </body>
</html>
