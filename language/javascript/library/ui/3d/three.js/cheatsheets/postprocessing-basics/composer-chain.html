<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EffectComposer 基础链</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">后处理</a>
      <span>观察 RenderPass + OutputPass 如何接管最终渲染入口</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="EffectComposer 基础链预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="EffectComposer 基础链控制面板">
        <h1>Composer 链路</h1>
        <label>
          渲染入口
          <select id="render-mode">
            <option value="composer">composer.render()</option>
            <option value="renderer">renderer.render()</option>
          </select>
        </label>
        <label>
          曝光
          <span class="range-field">
            <input id="exposure" type="range" min="0.4" max="1.8" step="0.05" value="1" />
            <output id="exposure-value">1.00</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>入口</dt><dd id="entry-state">-</dd></div>
          <div><dt>pass</dt><dd id="pass-state">-</dd></div>
          <div><dt>尺寸</dt><dd id="size-state">-</dd></div>
          <div><dt>输出</dt><dd id="output-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/composer-chain-main.js"></script>
  </body>
</html>
