<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UnrealBloomPass</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">后处理</a>
      <span>观察 threshold、strength、radius 如何控制发光后处理</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="UnrealBloomPass 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="UnrealBloomPass 控制面板">
        <h1>Bloom 参数</h1>
        <label>
          threshold
          <span class="range-field">
            <input id="threshold" type="range" min="0" max="2" step="0.01" value="0.75" />
            <output id="threshold-value">0.75</output>
          </span>
        </label>
        <label>
          strength
          <span class="range-field">
            <input id="strength" type="range" min="0" max="3" step="0.01" value="1.15" />
            <output id="strength-value">1.15</output>
          </span>
        </label>
        <label>
          radius
          <span class="range-field">
            <input id="radius" type="range" min="0" max="1" step="0.01" value="0.34" />
            <output id="radius-value">0.34</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>链路</dt><dd id="chain-state">-</dd></div>
          <div><dt>参数</dt><dd id="bloom-state">-</dd></div>
          <div><dt>亮区</dt><dd id="bright-state">-</dd></div>
          <div><dt>尺寸</dt><dd id="size-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/bloom-pass-main.js"></script>
  </body>
</html>
