<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FXAAPass</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">后处理</a>
      <span>观察 FXAA 与 pixel ratio、composer 尺寸同步的关系</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="FXAAPass 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="FXAAPass 控制面板">
        <h1>后处理抗锯齿</h1>
        <label>
          FXAA
          <select id="fxaa-mode">
            <option value="on">开启</option>
            <option value="off">关闭</option>
          </select>
        </label>
        <label>
          pixel ratio
          <span class="range-field">
            <input id="pixel-ratio" type="range" min="0.75" max="2" step="0.05" value="1" />
            <output id="pixel-ratio-value">1.00</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>链路</dt><dd id="chain-state">-</dd></div>
          <div><dt>尺寸</dt><dd id="size-state">-</dd></div>
          <div><dt>FXAA</dt><dd id="fxaa-state">-</dd></div>
          <div><dt>判断</dt><dd id="compare-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/antialias-pass-main.js"></script>
  </body>
</html>
