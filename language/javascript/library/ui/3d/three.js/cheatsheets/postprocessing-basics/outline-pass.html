<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OutlinePass</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">后处理</a>
      <span>观察 selectedObjects 决定哪些对象获得轮廓</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="OutlinePass 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="OutlinePass 控制面板">
        <h1>选中轮廓</h1>
        <div class="button-row" aria-label="选择对象">
          <button id="select-box" type="button">立方体</button>
          <button id="select-sphere" type="button">球体</button>
          <button id="select-torus" type="button">圆环</button>
          <button id="clear-selection" type="button">清空</button>
        </div>
        <label>
          edgeStrength
          <span class="range-field">
            <input id="edge-strength" type="range" min="0.5" max="8" step="0.1" value="3" />
            <output id="edge-strength-value">3.00</output>
          </span>
        </label>
        <label>
          edgeThickness
          <span class="range-field">
            <input id="edge-thickness" type="range" min="1" max="4" step="0.1" value="1.6" />
            <output id="edge-thickness-value">1.60</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>选中</dt><dd id="selected-state">-</dd></div>
          <div><dt>selectedObjects</dt><dd id="objects-state">-</dd></div>
          <div><dt>轮廓</dt><dd id="outline-state">-</dd></div>
          <div><dt>命中</dt><dd id="hit-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/outline-pass-main.js"></script>
  </body>
</html>
