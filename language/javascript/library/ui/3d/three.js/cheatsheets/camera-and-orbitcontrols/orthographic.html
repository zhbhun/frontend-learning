<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正交相机</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">相机</a>
        <h1 id="page-title">正交相机</h1>

        <div class="control-group">
          <h2>观察盒</h2>
          <label class="control-row">
            <span>视图高度</span>
            <output id="height-output">5.5</output>
            <input id="height-input" type="range" min="2" max="9" step="0.1" value="5.5" />
          </label>
          <label class="control-row">
            <span>zoom</span>
            <output id="zoom-output">1.00</output>
            <input id="zoom-input" type="range" min="0.5" max="3" step="0.05" value="1" />
          </label>
          <label class="control-row">
            <span>距离</span>
            <output id="distance-output">8.0</output>
            <input id="distance-input" type="range" min="4" max="14" step="0.1" value="8" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>观察盒</dt>
            <dd id="box-readout">0 x 0</dd>
          </div>
          <div>
            <dt>zoom</dt>
            <dd id="zoom-readout">1.00</dd>
          </div>
          <div>
            <dt>范围</dt>
            <dd id="range-readout">0.1 - 40.0</dd>
          </div>
          <div>
            <dt>位置</dt>
            <dd id="position-readout">0, 0, 0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="正交相机预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>OrthographicCamera</span>
          <span id="toolbar-readout">zoom 1.00</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/orthographic-main.js"></script>
  </body>
</html>
