<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>透视相机</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">相机</a>
        <h1 id="page-title">透视相机</h1>

        <div class="control-group">
          <h2>投影</h2>
          <label class="control-row">
            <span>视野角</span>
            <output id="fov-output">55°</output>
            <input id="fov-input" type="range" min="25" max="85" step="1" value="55" />
          </label>
          <label class="control-row">
            <span>near</span>
            <output id="near-output">0.1</output>
            <input id="near-input" type="range" min="0.1" max="6" step="0.1" value="0.1" />
          </label>
          <label class="control-row">
            <span>far</span>
            <output id="far-output">40.0</output>
            <input id="far-input" type="range" min="8" max="60" step="1" value="40" />
          </label>
          <label class="control-row">
            <span>距离</span>
            <output id="distance-output">8.0</output>
            <input id="distance-input" type="range" min="4" max="14" step="0.1" value="8" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>fov</dt>
            <dd id="fov-readout">55°</dd>
          </div>
          <div>
            <dt>aspect</dt>
            <dd id="aspect-readout">1.000</dd>
          </div>
          <div>
            <dt>范围</dt>
            <dd id="range-readout">0.1 - 40.0</dd>
          </div>
          <div>
            <dt>位置</dt>
            <dd id="position-readout">0, 0, 0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="透视相机预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>PerspectiveCamera</span>
          <span id="toolbar-readout">fov 55°</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/perspective-main.js"></script>
  </body>
</html>
