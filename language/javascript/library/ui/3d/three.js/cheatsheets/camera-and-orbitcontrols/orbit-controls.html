<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrbitControls</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">相机</a>
        <h1 id="page-title">OrbitControls</h1>

        <div class="control-group">
          <h2>控制器</h2>
          <label class="switch-row">
            <input id="damping-input" type="checkbox" checked />
            <span>阻尼</span>
          </label>
          <label class="switch-row">
            <input id="auto-rotate-input" type="checkbox" />
            <span>自动旋转</span>
          </label>
          <label class="switch-row">
            <input id="pan-input" type="checkbox" checked />
            <span>允许平移</span>
          </label>
          <label class="control-row">
            <span>最近距离</span>
            <output id="min-distance-output">3.0</output>
            <input id="min-distance-input" type="range" min="2" max="8" step="0.1" value="3" />
          </label>
          <label class="control-row">
            <span>最远距离</span>
            <output id="max-distance-output">16.0</output>
            <input id="max-distance-input" type="range" min="8" max="20" step="0.1" value="16" />
          </label>
          <label class="control-row">
            <span>目标高度</span>
            <output id="target-y-output">0.70</output>
            <input id="target-y-input" type="range" min="0" max="2" step="0.05" value="0.7" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>target</dt>
            <dd id="target-readout">0, 0, 0</dd>
          </div>
          <div>
            <dt>距离</dt>
            <dd id="distance-readout">0.0</dd>
          </div>
          <div>
            <dt>阻尼</dt>
            <dd id="damping-readout">true</dd>
          </div>
          <div>
            <dt>自动</dt>
            <dd id="auto-readout">false</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="OrbitControls 预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>OrbitControls(camera, canvas)</span>
          <span id="toolbar-readout">target 0, 0.70, 0</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/orbit-controls-main.js"></script>
  </body>
</html>
