<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hover Highlight</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">拾取</a>
      <span>基础链路 / Hover Highlight</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Hover Highlight 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Hover Highlight</h1>
        <dl class="metrics">
          <div><dt>hover</dt><dd id="hover-state">无</dd></div>
          <div><dt>distance</dt><dd id="distance-state">-</dd></div>
          <div><dt>point</dt><dd id="point-state">-</dd></div>
          <div><dt>hits</dt><dd id="hits-state">0</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/hover-highlight-main.js"></script>
  </body>
</html>
