<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Line / Points Threshold</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">拾取</a>
      <span>过滤与精度 / Line / Points Threshold</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Line / Points Threshold 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Line / Points Threshold</h1>
        <label>
          目标
          <select id="target-kind">
            <option value="both">Line + Points</option>
            <option value="line">只检测 Line</option>
            <option value="points">只检测 Points</option>
          </select>
        </label>
        <label>
          threshold
          <output id="threshold-output">0.12</output>
          <input id="threshold-input" type="range" min="0.02" max="0.5" step="0.01" value="0.12" />
        </label>
        <dl class="metrics">
          <div><dt>hover</dt><dd id="hover-state">无</dd></div>
          <div><dt>distance</dt><dd id="distance-state">-</dd></div>
          <div><dt>to ray</dt><dd id="ray-distance-state">-</dd></div>
          <div><dt>params</dt><dd id="params-state">Line 0.12 / Points 0.12</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/line-points-threshold-main.js"></script>
  </body>
</html>
