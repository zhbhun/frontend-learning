<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layers Filter</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">拾取</a>
      <span>过滤与精度 / Layers Filter</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Layers Filter 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Layers Filter</h1>
        <label>
          可拾取层
          <select id="layer-mode">
            <option value="0">layer 0</option>
            <option value="1">layer 1</option>
            <option value="2">layer 2</option>
          </select>
        </label>
        <dl class="metrics">
          <div><dt>raycaster</dt><dd id="raycaster-state">layer 0</dd></div>
          <div><dt>hover</dt><dd id="hover-state">无</dd></div>
          <div><dt>object layer</dt><dd id="object-layer-state">-</dd></div>
          <div><dt>visible</dt><dd id="visible-state">camera layers: 0, 1, 2</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/layers-filter-main.js"></script>
  </body>
</html>
