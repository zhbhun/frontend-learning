<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Selection</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">拾取</a>
      <span>基础链路 / Click Selection</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Click Selection 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Click Selection</h1>
        <button id="clear-selection" type="button">取消选中</button>
        <dl class="metrics">
          <div><dt>hover</dt><dd id="hover-state">无</dd></div>
          <div><dt>selected</dt><dd id="selected-state">无</dd></div>
          <div><dt>last hit</dt><dd id="hit-state">-</dd></div>
          <div><dt>action</dt><dd id="action-state">等待点击</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/click-selection-main.js"></script>
  </body>
</html>
