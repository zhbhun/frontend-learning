<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RawShaderMaterial 边界</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">Shader</a>
      <span>对照 ShaderMaterial 自动注入和 RawShaderMaterial 手动声明的最小差异</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="RawShaderMaterial 边界预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="RawShaderMaterial 边界控制面板">
        <h1>Raw 边界</h1>
        <label>
          动画速度
          <span class="range-field">
            <input id="time-speed" type="range" min="0" max="2" step="0.05" value="0.8" />
            <output id="time-speed-value">0.80</output>
          </span>
        </label>
        <label class="checkbox-row">
          <span>显示坐标轴</span>
          <input id="show-axes" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>左侧</dt><dd id="shader-state">-</dd></div>
          <div><dt>右侧</dt><dd id="raw-state">-</dd></div>
          <div><dt>边界</dt><dd id="boundary-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/raw-material-boundary-main.js"></script>
  </body>
</html>
