<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自定义 attribute 点云</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">Shader</a>
      <span>观察 BufferGeometry 上的自定义 attribute 如何按顶点控制点大小和颜色</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="自定义 attribute 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="自定义 attribute 控制面板">
        <h1>自定义 attribute</h1>
        <label>
          点大小
          <span class="range-field">
            <input id="point-size" type="range" min="8" max="42" step="1" value="22" />
            <output id="point-size-value">22</output>
          </span>
        </label>
        <label>
          扩散半径
          <span class="range-field">
            <input id="spread" type="range" min="0.4" max="1.8" step="0.05" value="1" />
            <output id="spread-value">1.00</output>
          </span>
        </label>
        <div class="button-row">
          <button id="shuffle-attributes" type="button">重写 attribute</button>
          <button id="toggle-rotation" type="button">暂停旋转</button>
        </div>
        <dl class="metrics">
          <div><dt>顶点数</dt><dd id="count-state">-</dd></div>
          <div><dt>attribute</dt><dd id="attribute-state">-</dd></div>
          <div><dt>更新</dt><dd id="update-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/custom-attribute-main.js"></script>
  </body>
</html>
