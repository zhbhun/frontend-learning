<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>varying 插值渐变</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">Shader</a>
      <span>观察 vertex shader 写出的 varying 如何被插值后送到每个片元</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="varying 渐变预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="varying 渐变控制面板">
        <h1>varying 渐变</h1>
        <label>
          渐变来源
          <select id="gradient-mode">
            <option value="uv">UV 的 y 值</option>
            <option value="height">局部高度</option>
            <option value="normal">法线朝向</option>
          </select>
        </label>
        <label>
          分界锐度
          <span class="range-field">
            <input id="contrast" type="range" min="0.4" max="3.2" step="0.05" value="1.25" />
            <output id="contrast-value">1.25</output>
          </span>
        </label>
        <label class="checkbox-row">
          <span>旋转观察</span>
          <input id="rotate-model" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>varying</dt><dd id="varying-state">-</dd></div>
          <div><dt>插值</dt><dd id="interpolation-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/varying-gradient-main.js"></script>
  </body>
</html>
