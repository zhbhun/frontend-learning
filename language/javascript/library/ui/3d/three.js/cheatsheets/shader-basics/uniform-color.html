<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uniform 控制颜色</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">Shader</a>
      <span>观察 JS 如何逐帧更新 uniform：时间、颜色、分辨率和指针位置</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="uniform 颜色预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="uniform 颜色控制面板">
        <h1>uniform 颜色</h1>
        <label>
          主色
          <input id="base-color" type="color" value="#2f83d8" />
        </label>
        <label>
          辅色
          <input id="accent-color" type="color" value="#f08a4b" />
        </label>
        <label>
          时间速度
          <span class="range-field">
            <input id="time-speed" type="range" min="0" max="2.4" step="0.05" value="1" />
            <output id="time-speed-value">1.00</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>uniform</dt><dd id="uniform-state">-</dd></div>
          <div><dt>分辨率</dt><dd id="resolution-state">-</dd></div>
          <div><dt>指针</dt><dd id="pointer-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/uniform-color-main.js"></script>
  </body>
</html>
