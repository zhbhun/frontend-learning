<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>顶点 shader 波浪形变</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">Shader</a>
      <span>观察 vertex shader 如何先移动顶点，再让 fragment shader 给表面上色</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="顶点形变预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="顶点形变控制面板">
        <h1>顶点形变</h1>
        <label>
          振幅
          <span class="range-field">
            <input id="amplitude" type="range" min="0" max="0.7" step="0.01" value="0.26" />
            <output id="amplitude-value">0.26</output>
          </span>
        </label>
        <label>
          频率
          <span class="range-field">
            <input id="frequency" type="range" min="0.6" max="5.2" step="0.05" value="2.4" />
            <output id="frequency-value">2.40</output>
          </span>
        </label>
        <label>
          速度
          <span class="range-field">
            <input id="speed" type="range" min="0" max="2.6" step="0.05" value="1" />
            <output id="speed-value">1.00</output>
          </span>
        </label>
        <label class="checkbox-row">
          <span>线框</span>
          <input id="wireframe" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>顶点阶段</dt><dd id="vertex-state">-</dd></div>
          <div><dt>片元阶段</dt><dd id="fragment-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/vertex-displacement-main.js"></script>
  </body>
</html>
