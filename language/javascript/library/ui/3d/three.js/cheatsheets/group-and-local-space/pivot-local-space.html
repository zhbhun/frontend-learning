<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pivot 与局部空间</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Group</a>
        <h1 id="page-title">pivot 与局部空间</h1>

        <div class="control-group">
          <h2>Pivot group</h2>
          <label class="control-row">
            <span>打开角度</span>
            <output id="angle-output">45°</output>
            <input id="angle-input" type="range" min="-90" max="120" step="1" value="45" />
          </label>
          <label class="control-row">
            <span>面板偏移</span>
            <output id="offset-output">1.2</output>
            <input id="offset-input" type="range" min="0.4" max="2.4" step="0.1" value="1.2" />
          </label>
          <label class="control-row">
            <span>pivot X</span>
            <output id="pivot-x-output">0.0</output>
            <input id="pivot-x-input" type="range" min="-2" max="2" step="0.1" value="0" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>panel 局部 X</dt>
            <dd id="panel-local-x-readout">1.2</dd>
          </div>
          <div>
            <dt>panel 世界 X</dt>
            <dd id="panel-world-x-readout">0.0</dd>
          </div>
          <div>
            <dt>panel 世界 Z</dt>
            <dd id="panel-world-z-readout">0.0</dd>
          </div>
          <div>
            <dt>pivot 世界 X</dt>
            <dd id="pivot-world-x-readout">0.0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="pivot 与局部空间预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>pivot Group</span>
          <span id="toolbar-readout">angle 45°</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/pivot-local-space-main.js"></script>
  </body>
</html>
