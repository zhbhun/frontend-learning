<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>组织一组对象</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">Group</a>
        <h1 id="page-title">组织一组对象</h1>

        <div class="control-group">
          <h2>Group transform</h2>
          <label class="control-row">
            <span>位置 X</span>
            <output id="group-x-output">0.0</output>
            <input id="group-x-input" type="range" min="-2.5" max="2.5" step="0.1" value="0" />
          </label>
          <label class="control-row">
            <span>旋转 Y</span>
            <output id="rotation-output">0°</output>
            <input id="rotation-input" type="range" min="-90" max="90" step="1" value="0" />
          </label>
          <label class="control-row">
            <span>缩放</span>
            <output id="scale-output">1.00</output>
            <input id="scale-input" type="range" min="0.6" max="1.6" step="0.05" value="1" />
          </label>
          <label class="switch-row">
            <input id="axes-input" type="checkbox" checked />
            <span>显示局部轴</span>
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>直接子级</dt>
            <dd id="children-readout">0</dd>
          </div>
          <div>
            <dt>遍历总数</dt>
            <dd id="traverse-readout">0</dd>
          </div>
          <div>
            <dt>group 世界 X</dt>
            <dd id="world-x-readout">0.0</dd>
          </div>
          <div>
            <dt>车身局部 X</dt>
            <dd id="body-local-x-readout">0.0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="Group 组织示例预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>vehicle Group</span>
          <span id="toolbar-readout">children 0</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/group-container-main.js"></script>
  </body>
</html>
