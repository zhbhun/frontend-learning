<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>渲染循环、画布尺寸与像素比</title>
  </head>
  <body>
    <div class="layout">
      <aside class="control-panel" aria-labelledby="lesson-title">
        <h1 id="lesson-title">渲染循环、画布尺寸与像素比</h1>

        <section class="control-group" aria-labelledby="strategy-label">
          <h2 id="strategy-label">尺寸策略</h2>
          <div class="strategy-list" role="radiogroup" aria-labelledby="strategy-label">
            <label>
              <input type="radio" name="strategy" value="correct" checked />
              <span>正确同步</span>
            </label>
            <label>
              <input type="radio" name="strategy" value="css-only" />
              <span>只拉伸 CSS</span>
            </label>
            <label>
              <input type="radio" name="strategy" value="wrong-camera" />
              <span>忘记相机比例</span>
            </label>
          </div>
        </section>

        <section class="control-group" aria-labelledby="width-label">
          <div class="slider-header">
            <h2 id="width-label">舞台宽度</h2>
            <output data-stage-width-value>100%</output>
          </div>
          <input data-stage-width type="range" min="45" max="100" step="1" value="100" />
        </section>

        <section class="control-group" aria-labelledby="pixel-ratio-label">
          <div class="slider-header">
            <h2 id="pixel-ratio-label">像素比</h2>
            <output data-pixel-ratio-value>1.00</output>
          </div>
          <input data-pixel-ratio type="range" min="1" max="2" step="0.25" value="1" />
        </section>

        <section class="control-group" aria-labelledby="speed-label">
          <div class="slider-header">
            <h2 id="speed-label">速度</h2>
            <output data-speed-value>1.0x</output>
          </div>
          <input data-speed type="range" min="0" max="2" step="0.1" value="1" />
        </section>

        <dl class="metrics">
          <div>
            <dt>CSS 尺寸</dt>
            <dd data-css-size>0 x 0</dd>
          </div>
          <div>
            <dt>绘制缓冲区</dt>
            <dd data-buffer-size>0 x 0</dd>
          </div>
          <div>
            <dt>相机比例</dt>
            <dd data-aspect>0</dd>
          </div>
          <div>
            <dt>帧间隔</dt>
            <dd data-delta>0 ms</dd>
          </div>
          <div>
            <dt>帧率</dt>
            <dd data-fps>0</dd>
          </div>
        </dl>
      </aside>

      <main class="stage-panel">
        <div class="stage-toolbar">
          <span>预览</span>
          <span data-strategy-readout>正确同步</span>
        </div>
        <div class="stage-shell">
          <div class="stage-frame" data-stage-frame>
            <canvas id="scene-canvas" aria-label="Responsive three.js scene"></canvas>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
