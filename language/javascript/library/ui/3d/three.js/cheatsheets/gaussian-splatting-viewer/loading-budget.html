<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>加载预算 - Splatting</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">6.1.4 Splatting</a>
      <span>模拟 splat 文件加载、失败 fallback 和移动端预算估算</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="加载预算观察画布">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>加载预算</h1>
        <label>
          文件格式
          <select id="format-kind">
            <option value="ply">.ply</option>
            <option value="splat" selected>.splat</option>
            <option value="ksplat">.ksplat</option>
          </select>
        </label>
        <label>
          splat 数量
          <select id="budget-count">
            <option value="100000">10 万</option>
            <option value="500000" selected>50 万</option>
            <option value="1000000">100 万</option>
            <option value="2000000">200 万</option>
          </select>
        </label>
        <label class="range-field">
          每个 splat 字节
          <input id="bytes-per-splat" type="range" min="16" max="96" value="32" step="2" />
          <output id="bytes-per-splat-value"></output>
        </label>
        <label>
          网络速度
          <select id="bandwidth">
            <option value="2">2 MB/s</option>
            <option value="8" selected>8 MB/s</option>
            <option value="25">25 MB/s</option>
          </select>
        </label>
        <label class="range-field">
          移动端 DPR
          <input id="dpr-limit" type="range" min="1" max="2.5" value="1.5" step="0.1" />
          <output id="dpr-limit-value"></output>
        </label>
        <div class="button-row">
          <button id="start-load" type="button">模拟加载</button>
          <button id="fail-load" type="button">模拟失败</button>
          <button id="reset-load" type="button">重置</button>
        </div>
        <div class="progress-track" aria-label="加载进度">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <dl class="metrics">
          <div>
            <dt>进度</dt>
            <dd id="progress-state"></dd>
          </div>
          <div>
            <dt>预算</dt>
            <dd id="budget-state"></dd>
          </div>
          <div>
            <dt>状态</dt>
            <dd id="load-state"></dd>
          </div>
          <div>
            <dt>建议</dt>
            <dd id="advice-state"></dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/loading-budget-main.js"></script>
  </body>
</html>
