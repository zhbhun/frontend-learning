<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>透明排序 - Splatting</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">6.1.4 Splatting</a>
      <span>观察半透明 billboard 的绘制顺序、depthWrite 和 alphaTest</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="透明排序观察画布">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>透明排序</h1>
        <label>
          绘制顺序
          <select id="sort-mode">
            <option value="auto" selected>three.js 自动对象排序</option>
            <option value="back-first">手动：远处先画</option>
            <option value="front-first">手动：近处先画</option>
          </select>
        </label>
        <label class="range-field">
          透明度
          <input id="opacity" type="range" min="0.25" max="0.95" value="0.66" step="0.01" />
          <output id="opacity-value"></output>
        </label>
        <label class="range-field">
          alphaTest
          <input id="alpha-test" type="range" min="0" max="0.45" value="0.02" step="0.01" />
          <output id="alpha-test-value"></output>
        </label>
        <label class="checkbox-row">
          depthWrite
          <input id="depth-write" type="checkbox" />
        </label>
        <label class="checkbox-row">
          缓慢摆动相机
          <input id="camera-sway" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div>
            <dt>顺序</dt>
            <dd id="order-state"></dd>
          </div>
          <div>
            <dt>状态</dt>
            <dd id="material-state"></dd>
          </div>
          <div>
            <dt>观察</dt>
            <dd id="observe-state"></dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/sort-and-alpha-main.js"></script>
  </body>
</html>
