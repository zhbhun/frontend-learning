<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>viewer adapter - Splatting</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">6.1.4 Splatting</a>
      <span>观察真实项目中 viewer adapter 的 mount、resize、pause 和 dispose 边界</span>
    </header>
    <main class="lesson-shell">
      <section id="viewer-host" class="viewport viewer-host" aria-label="viewer adapter 挂载区域"></section>
      <aside class="panel">
        <h1>viewer adapter</h1>
        <label>
          mock splat 数量
          <select id="viewer-count">
            <option value="180">180</option>
            <option value="420" selected>420</option>
            <option value="900">900</option>
          </select>
        </label>
        <label class="range-field">
          DPR 上限
          <input id="viewer-dpr" type="range" min="1" max="2.5" value="1.5" step="0.1" />
          <output id="viewer-dpr-value"></output>
        </label>
        <div class="button-row">
          <button id="mount-viewer" type="button">mount</button>
          <button id="load-viewer" type="button">load</button>
          <button id="pause-viewer" type="button">pause</button>
          <button id="resume-viewer" type="button">resume</button>
          <button id="unmount-viewer" type="button">unmount</button>
        </div>
        <dl class="metrics">
          <div>
            <dt>生命周期</dt>
            <dd id="lifecycle-state"></dd>
          </div>
          <div>
            <dt>资源</dt>
            <dd id="resource-state"></dd>
          </div>
          <div>
            <dt>渲染</dt>
            <dd id="render-state"></dd>
          </div>
          <div>
            <dt>事件</dt>
            <dd id="event-state"></dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/viewer-integration-main.js"></script>
  </body>
</html>
