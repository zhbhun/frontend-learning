<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表达差异 - Splatting</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">6.1.4 Splatting</a>
      <span>观察同一团数据在 mesh、Points 和 billboard splat mock 中的表达差异</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="表达差异观察画布">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>表达差异</h1>
        <label>
          splat 数量
          <select id="splat-count">
            <option value="90">90</option>
            <option value="180" selected>180</option>
            <option value="360">360</option>
            <option value="720">720</option>
          </select>
        </label>
        <label class="range-field">
          billboard 尺寸
          <input id="splat-scale" type="range" min="0.45" max="1.7" value="1" step="0.05" />
          <output id="splat-scale-value"></output>
        </label>
        <label class="range-field">
          Points 点径
          <input id="point-size" type="range" min="1" max="12" value="5" step="0.5" />
          <output id="point-size-value"></output>
        </label>
        <label class="checkbox-row">
          自动旋转
          <input id="auto-rotate" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div>
            <dt>表达</dt>
            <dd id="representation-state"></dd>
          </div>
          <div>
            <dt>读数</dt>
            <dd id="render-state"></dd>
          </div>
          <div>
            <dt>观察</dt>
            <dd id="observe-state"></dd>
          </div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/representation-compare-main.js"></script>
  </body>
</html>
