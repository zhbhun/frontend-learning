<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Object3D 层级与变换</title>
  </head>
  <body>
    <div class="layout">
      <aside class="control-panel" aria-labelledby="lesson-title">
        <h1 id="lesson-title">对象</h1>

        <section class="control-group" aria-labelledby="motion-label">
          <h2 id="motion-label">运动</h2>
          <button class="command-button" type="button" data-toggle-running>暂停</button>
          <button class="command-button secondary" type="button" data-reset>重置</button>
        </section>

        <section class="control-group" aria-labelledby="parent-label">
          <h2 id="parent-label">父对象</h2>
          <label class="control-row">
            <span>旋转 Y</span>
            <output data-parent-rotation-value>25°</output>
            <input data-parent-rotation type="range" min="-180" max="180" step="1" value="25" />
          </label>
          <label class="control-row">
            <span>缩放</span>
            <output data-parent-scale-value>1.00</output>
            <input data-parent-scale type="range" min="0.5" max="1.8" step="0.05" value="1" />
          </label>
        </section>

        <section class="control-group" aria-labelledby="child-label">
          <h2 id="child-label">子对象局部位置</h2>
          <label class="control-row">
            <span>X</span>
            <output data-child-x-value>2.20</output>
            <input data-child-x type="range" min="0.8" max="3.2" step="0.05" value="2.2" />
          </label>
          <label class="control-row">
            <span>Y</span>
            <output data-child-y-value>0.60</output>
            <input data-child-y type="range" min="-1.2" max="1.6" step="0.05" value="0.6" />
          </label>
        </section>

        <dl class="metrics">
          <div>
            <dt>父 world</dt>
            <dd data-parent-world>0, 0, 0</dd>
          </div>
          <div>
            <dt>子 local</dt>
            <dd data-child-local>0, 0, 0</dd>
          </div>
          <div>
            <dt>子 world</dt>
            <dd data-child-world>0, 0, 0</dd>
          </div>
        </dl>
      </aside>

      <main class="stage-panel">
        <div class="stage-toolbar">
          <span>预览</span>
          <span data-mode-readout>层级变换</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas" aria-label="Object3D hierarchy scene"></canvas>
        </div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
