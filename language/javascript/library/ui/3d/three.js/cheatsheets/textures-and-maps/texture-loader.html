<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TextureLoader</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>加载与来源 / TextureLoader</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="TextureLoader 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>TextureLoader</h1>
        <button id="reload-texture" type="button">重新加载</button>
        <dl class="metrics">
          <div><dt>进度</dt><dd id="load-state"></dd></div>
          <div><dt>尺寸</dt><dd id="image-size"></dd></div>
          <div><dt>map</dt><dd id="map-state"></dd></div>
          <div><dt>version</dt><dd id="version-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/texture-loader-main.js"></script>
  </body>
</html>
