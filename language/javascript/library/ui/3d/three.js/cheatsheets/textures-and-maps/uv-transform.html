<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UV Transform</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>UV 与采样 / UV Transform</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="UV Transform 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>UV Transform</h1>
        <label>repeat U <output id="repeat-u-value"></output><input id="repeat-u" type="range" min="1" max="6" step="0.5" value="3" /></label>
        <label>repeat V <output id="repeat-v-value"></output><input id="repeat-v" type="range" min="1" max="6" step="0.5" value="2" /></label>
        <label>offset U <output id="offset-u-value"></output><input id="offset-u" type="range" min="-1" max="1" step="0.05" value="0" /></label>
        <label>rotation <output id="rotation-value"></output><input id="rotation" type="range" min="-180" max="180" step="15" value="0" /></label>
        <dl class="metrics">
          <div><dt>repeat</dt><dd id="repeat-state"></dd></div>
          <div><dt>offset</dt><dd id="offset-state"></dd></div>
          <div><dt>rotation</dt><dd id="rotation-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/uv-transform-main.js"></script>
  </body>
</html>
