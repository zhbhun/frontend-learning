<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filters / Mipmaps</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>UV 与采样 / Filters / Mipmaps</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Filters 和 Mipmaps 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Filters / Mipmaps</h1>
        <label>magFilter
          <select id="mag-filter">
            <option value="linear" selected>Linear</option>
            <option value="nearest">Nearest</option>
          </select>
        </label>
        <label>minFilter
          <select id="min-filter">
            <option value="linear-mipmap" selected>LinearMipmap</option>
            <option value="linear">Linear</option>
            <option value="nearest">Nearest</option>
          </select>
        </label>
        <label class="check-row"><input id="generate-mipmaps" type="checkbox" checked /> generateMipmaps</label>
        <label>anisotropy <output id="anisotropy-value"></output><input id="anisotropy" type="range" min="1" max="16" step="1" value="1" /></label>
        <dl class="metrics">
          <div><dt>filter</dt><dd id="filter-state"></dd></div>
          <div><dt>mipmap</dt><dd id="mipmap-state"></dd></div>
          <div><dt>anisotropy</dt><dd id="anisotropy-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/filters-mipmaps-main.js"></script>
  </body>
</html>
