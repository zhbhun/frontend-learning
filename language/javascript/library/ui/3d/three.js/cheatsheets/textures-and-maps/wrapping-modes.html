<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrapping Modes</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>UV 与采样 / Wrapping Modes</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Wrapping Modes 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Wrapping Modes</h1>
        <label>wrapS / wrapT
          <select id="wrap-mode">
            <option value="clamp">ClampToEdge</option>
            <option value="repeat" selected>Repeat</option>
            <option value="mirror">MirroredRepeat</option>
          </select>
        </label>
        <label>repeat <output id="repeat-value"></output><input id="repeat" type="range" min="1" max="5" step="0.5" value="2.5" /></label>
        <dl class="metrics">
          <div><dt>wrap</dt><dd id="wrap-state"></dd></div>
          <div><dt>repeat</dt><dd id="repeat-state"></dd></div>
          <div><dt>upload</dt><dd id="upload-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/wrapping-modes-main.js"></script>
  </body>
</html>
