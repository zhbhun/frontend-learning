<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CanvasTexture</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>加载与来源 / CanvasTexture</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="CanvasTexture 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>CanvasTexture</h1>
        <label>图案序号 <output id="pattern-value"></output><input id="pattern" type="range" min="0" max="5" step="1" value="0" /></label>
        <label class="check-row"><input id="auto-upload" type="checkbox" checked /> 修改后设置 needsUpdate</label>
        <button id="upload-once" type="button">手动上传一次</button>
        <dl class="metrics">
          <div><dt>canvas</dt><dd id="canvas-state"></dd></div>
          <div><dt>needsUpdate</dt><dd id="needs-update-state"></dd></div>
          <div><dt>version</dt><dd id="version-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/canvas-texture-main.js"></script>
  </body>
</html>
