<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataTexture</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>加载与来源 / DataTexture</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="DataTexture 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>DataTexture</h1>
        <label>数据模式
          <select id="data-mode">
            <option value="checker" selected>checker</option>
            <option value="ramp">ramp</option>
            <option value="mask">mask</option>
          </select>
        </label>
        <label>对比度 <output id="contrast-value"></output><input id="contrast" type="range" min="0.3" max="1.8" step="0.1" value="1" /></label>
        <dl class="metrics">
          <div><dt>buffer</dt><dd id="buffer-state"></dd></div>
          <div><dt>format</dt><dd id="format-state"></dd></div>
          <div><dt>upload</dt><dd id="upload-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/data-texture-main.js"></script>
  </body>
</html>
