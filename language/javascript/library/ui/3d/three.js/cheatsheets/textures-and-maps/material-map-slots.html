<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Map Slots</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>材质贴图槽 / Material Map Slots</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="材质贴图槽预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Material Map Slots</h1>
        <label>观察贴图槽
          <select id="slot">
            <option value="map" selected>map</option>
            <option value="normal">normalMap</option>
            <option value="roughness">roughnessMap</option>
            <option value="alpha">alphaMap</option>
          </select>
        </label>
        <label>强度 <output id="strength-value"></output><input id="strength" type="range" min="0" max="2" step="0.05" value="1" /></label>
        <dl class="metrics">
          <div><dt>slot</dt><dd id="slot-state"></dd></div>
          <div><dt>colorSpace</dt><dd id="color-space-state"></dd></div>
          <div><dt>material</dt><dd id="material-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/material-map-slots-main.js"></script>
  </body>
</html>
