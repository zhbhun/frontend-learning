<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Space</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">纹理</a>
      <span>颜色与方向 / Color Space</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Color Space 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Color Space</h1>
        <label>右侧 colorSpace
          <select id="right-color-space">
            <option value="srgb">sRGB</option>
            <option value="linear">Linear sRGB</option>
            <option value="none" selected>NoColorSpace</option>
          </select>
        </label>
        <dl class="metrics">
          <div><dt>左侧</dt><dd id="left-state"></dd></div>
          <div><dt>右侧</dt><dd id="right-state"></dd></div>
          <div><dt>观察</dt><dd id="compare-state"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/color-space-main.js"></script>
  </body>
</html>
