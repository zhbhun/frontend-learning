<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>instancing-reuse</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">性能</a>
      <span>复用与实例化 / instancing-reuse</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="instancing-reuse 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>instancing-reuse</h1>

        <label>
          渲染方式
          <select id="render-mode">
            <option value="mesh">普通 Mesh</option>
            <option value="instanced">InstancedMesh</option>
          </select>
        </label>

        <label>
          实例数量
          <output id="instance-count-value">400</output>
          <input id="instance-count" type="range" min="25" max="900" step="25" value="400" />
        </label>

        <label class="checkbox-row">
          <input id="use-instance-colors" type="checkbox" checked />
          <span>使用颜色差异</span>
        </label>

        <dl class="metrics">
          <div><dt>objects</dt><dd id="objects-readout">0</dd></div>
          <div><dt>calls</dt><dd id="calls-readout">0</dd></div>
          <div><dt>triangles</dt><dd id="triangles-readout">0</dd></div>
          <div><dt>geometries</dt><dd id="geometries-readout">0</dd></div>
          <div><dt>textures</dt><dd id="textures-readout">0</dd></div>
          <div><dt>programs</dt><dd id="programs-readout">0</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/instancing-reuse-main.js"></script>
  </body>
</html>
