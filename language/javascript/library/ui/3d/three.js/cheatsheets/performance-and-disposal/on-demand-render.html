<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>on-demand-render</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">性能</a>
      <span>页面调度 / on-demand-render</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="on-demand-render 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>on-demand-render</h1>

        <label class="checkbox-row">
          <input id="continuous-render" type="checkbox" />
          <span>连续渲染</span>
        </label>

        <label>
          物体旋转
          <output id="rotation-value">0</output>
          <input id="rotation" type="range" min="0" max="360" step="1" value="0" />
        </label>

        <button id="request-frame" type="button">请求一帧</button>

        <dl class="metrics">
          <div><dt>frames</dt><dd id="frames-readout">0</dd></div>
          <div><dt>mode</dt><dd id="mode-readout">按需渲染</dd></div>
          <div><dt>visibility</dt><dd id="visibility-readout">visible</dd></div>
          <div><dt>intersection</dt><dd id="intersection-readout">in view</dd></div>
          <div><dt>calls</dt><dd id="calls-readout">0</dd></div>
          <div><dt>reason</dt><dd id="reason-readout">初始化</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/on-demand-render-main.js"></script>
  </body>
</html>
