<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>texture-budget</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">性能</a>
      <span>纹理预算 / texture-budget</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="texture-budget 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>texture-budget</h1>

        <label>
          来源
          <select id="texture-source">
            <option value="canvas">CanvasTexture</option>
            <option value="data">DataTexture</option>
          </select>
        </label>

        <label>
          尺寸
          <select id="texture-size">
            <option value="64">64 x 64</option>
            <option value="256" selected>256 x 256</option>
            <option value="1024">1024 x 1024</option>
          </select>
        </label>

        <label>
          纹理数量
          <select id="texture-count">
            <option value="1">1</option>
            <option value="4" selected>4</option>
            <option value="9">9</option>
          </select>
        </label>

        <label class="checkbox-row">
          <input id="reuse-texture" type="checkbox" checked />
          <span>多个材质复用同一 Texture</span>
        </label>

        <label class="checkbox-row">
          <input id="generate-mipmaps" type="checkbox" checked />
          <span>generateMipmaps</span>
        </label>

        <label>
          minFilter
          <select id="min-filter">
            <option value="linear-mipmap">LinearMipmapLinearFilter</option>
            <option value="linear">LinearFilter</option>
            <option value="nearest">NearestFilter</option>
          </select>
        </label>

        <dl class="metrics">
          <div><dt>textures</dt><dd id="textures-readout">0</dd></div>
          <div><dt>estimated</dt><dd id="estimated-readout">0</dd></div>
          <div><dt>filter</dt><dd id="filter-readout">-</dd></div>
          <div><dt>version</dt><dd id="version-readout">0</dd></div>
          <div><dt>calls</dt><dd id="calls-readout">0</dd></div>
          <div><dt>programs</dt><dd id="programs-readout">0</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/texture-budget-main.js"></script>
  </body>
</html>
