<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dispose-lifecycle</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">性能</a>
      <span>资源释放 / dispose-lifecycle</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="dispose-lifecycle 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>dispose-lifecycle</h1>

        <label class="checkbox-row">
          <input id="safe-dispose" type="checkbox" checked />
          <span>操作旧资源时调用 dispose()</span>
        </label>

        <div class="button-stack" aria-label="资源生命周期操作">
          <button id="add-batch" type="button">添加 8 个对象</button>
          <button id="replace-textures" type="button">替换贴图</button>
          <button id="remove-half" type="button">移除一半对象</button>
          <button id="clear-scene" type="button">清空当前对象</button>
          <button id="release-retained" type="button">释放保留引用</button>
        </div>

        <dl class="metrics">
          <div><dt>active</dt><dd id="active-readout">0</dd></div>
          <div><dt>retained</dt><dd id="retained-readout">0</dd></div>
          <div><dt>geometries</dt><dd id="geometries-readout">0</dd></div>
          <div><dt>textures</dt><dd id="textures-readout">0</dd></div>
          <div><dt>programs</dt><dd id="programs-readout">0</dd></div>
          <div><dt>last</dt><dd id="last-action-readout">等待操作</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/dispose-lifecycle-main.js"></script>
  </body>
</html>
