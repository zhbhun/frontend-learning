<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>render-cost</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">性能</a>
      <span>渲染读数 / render-cost</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="render-cost 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>render-cost</h1>

        <label>
          对象数量
          <output id="object-count-value">0</output>
          <input id="object-count" type="range" min="1" max="160" step="1" value="48" />
        </label>

        <label>
          对象类型
          <select id="primitive-kind">
            <option value="box">BoxGeometry</option>
            <option value="sphere">SphereGeometry</option>
            <option value="line">LineSegments</option>
            <option value="points">Points</option>
          </select>
        </label>

        <label>
          分段 / 顶点密度
          <output id="segment-count-value">16</output>
          <input id="segment-count" type="range" min="6" max="48" step="2" value="16" />
        </label>

        <label>
          材质策略
          <select id="material-mode">
            <option value="shared">共享 material</option>
            <option value="unique">每个对象独立 material</option>
            <option value="groups">双材质 geometry groups</option>
          </select>
        </label>

        <dl class="metrics">
          <div><dt>calls</dt><dd id="calls-readout">0</dd></div>
          <div><dt>triangles</dt><dd id="triangles-readout">0</dd></div>
          <div><dt>points</dt><dd id="points-readout">0</dd></div>
          <div><dt>lines</dt><dd id="lines-readout">0</dd></div>
          <div><dt>materials</dt><dd id="materials-readout">0</dd></div>
          <div><dt>programs</dt><dd id="programs-readout">0</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/render-cost-main.js"></script>
  </body>
</html>
