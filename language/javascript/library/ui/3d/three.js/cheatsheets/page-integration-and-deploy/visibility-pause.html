<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>可见性暂停</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body class="visibility-page">
    <header class="topbar">
      <a href="./index.html">页面</a>
      <span>可见性暂停</span>
    </header>

    <main>
      <section class="scroll-band">
        <span>页面顶部内容</span>
      </section>

      <section class="lesson-shell visibility-shell">
        <div class="viewport">
          <div id="visibility-frame" class="stage-frame">
            <canvas id="scene-canvas" aria-label="可见性暂停示例画布"></canvas>
          </div>
        </div>

        <aside class="panel sticky-panel" aria-labelledby="panel-title">
          <h1 id="panel-title">渲染暂停</h1>

          <dl class="metrics">
            <div>
              <dt>循环状态</dt>
              <dd id="loop-state">初始化</dd>
            </div>
            <div>
              <dt>页面状态</dt>
              <dd id="visibility-state">visible</dd>
            </div>
            <div>
              <dt>视口状态</dt>
              <dd id="intersection-state">in view</dd>
            </div>
            <div>
              <dt>帧数</dt>
              <dd id="frame-count">0</dd>
            </div>
            <div>
              <dt>delta</dt>
              <dd id="delta-state">0 ms</dd>
            </div>
            <div>
              <dt>最后动作</dt>
              <dd id="pause-reason">初始化</dd>
            </div>
          </dl>
        </aside>
      </section>

      <section class="scroll-band bottom-band">
        <span>页面底部内容</span>
      </section>
    </main>

    <script type="module" src="./src/visibility-pause-main.js"></script>
  </body>
</html>
