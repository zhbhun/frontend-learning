<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>DOM 叠层</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">页面</a>
      <span>DOM 叠层</span>
    </header>

    <main class="lesson-shell">
      <section class="viewport">
        <div id="overlay-stage" class="stage-frame overlay-stage">
          <canvas id="scene-canvas" aria-label="DOM overlay 拾取示例画布"></canvas>
          <div class="hud-label">HUD 读数层</div>
          <div id="overlay-blocker" class="overlay-blocker">DOM 叠层测试区</div>
        </div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">指针边界</h1>

        <label class="checkbox-row">
          <input id="overlay-blocking" type="checkbox" checked />
          <span>叠层拦截指针</span>
        </label>

        <dl class="metrics">
          <div>
            <dt>事件来源</dt>
            <dd id="pointer-source">无</dd>
          </div>
          <div>
            <dt>NDC</dt>
            <dd id="ndc-state">x 0, y 0</dd>
          </div>
          <div>
            <dt>Hover</dt>
            <dd id="hover-state">无</dd>
          </div>
          <div>
            <dt>选中</dt>
            <dd id="selected-state">无</dd>
          </div>
          <div>
            <dt>叠层模式</dt>
            <dd id="overlay-state">拦截 canvas</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/dom-overlay-main.js"></script>
  </body>
</html>
