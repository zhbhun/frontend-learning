<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>挂载生命周期</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">页面</a>
      <span>挂载生命周期</span>
    </header>

    <main class="lesson-shell">
      <section class="viewport">
        <div id="mount-host" class="stage-frame mount-host" aria-label="路由组件挂载区域"></div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">路由组件</h1>

        <div class="button-row">
          <button id="mount-button" type="button">挂载</button>
          <button id="unmount-button" type="button">卸载</button>
          <button id="remount-button" type="button">重新挂载</button>
        </div>

        <label class="checkbox-row">
          <input id="use-texture" type="checkbox" checked />
          <span>挂载时创建纹理</span>
        </label>

        <dl class="metrics">
          <div>
            <dt>状态</dt>
            <dd id="mount-state">未挂载</dd>
          </div>
          <div>
            <dt>挂载次数</dt>
            <dd id="mount-count">0</dd>
          </div>
          <div>
            <dt>释放次数</dt>
            <dd id="dispose-count">0</dd>
          </div>
          <div>
            <dt>释放资源</dt>
            <dd id="disposed-resources">geometry 0 / material 0 / texture 0</dd>
          </div>
          <div>
            <dt>监听器</dt>
            <dd id="listener-state">0</dd>
          </div>
          <div>
            <dt>最后动作</dt>
            <dd id="lifecycle-action">初始化</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/lifecycle-mount-main.js"></script>
  </body>
</html>
