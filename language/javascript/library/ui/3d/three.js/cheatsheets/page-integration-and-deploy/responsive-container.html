<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>响应式容器</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">页面</a>
      <span>响应式容器</span>
    </header>

    <main class="lesson-shell responsive-demo">
      <section class="viewport">
        <div class="browser-page">
          <header class="demo-header">
            <span>商品详情</span>
            <strong>3D 预览</strong>
          </header>
          <div class="demo-columns">
            <aside class="demo-aside">
              <span>参数</span>
              <span>规格</span>
              <span>库存</span>
            </aside>
            <article class="demo-article">
              <div class="demo-copy">
                <strong>普通页面内容</strong>
                <span>canvas 嵌在内容流里，宽度和比例由 CSS 决定。</span>
              </div>
              <div id="responsive-frame" class="responsive-frame">
                <canvas id="scene-canvas" aria-label="响应式 three.js 画布"></canvas>
              </div>
            </article>
          </div>
        </div>
      </section>

      <aside class="panel" aria-labelledby="panel-title">
        <h1 id="panel-title">容器尺寸</h1>

        <label>
          <span>容器宽度</span>
          <output id="container-width-value">100%</output>
          <input id="container-width" type="range" min="48" max="100" step="1" value="100" />
        </label>

        <label>
          <span>容器比例</span>
          <select id="aspect-ratio">
            <option value="16 / 9">16:9</option>
            <option value="4 / 3">4:3</option>
            <option value="1 / 1">1:1</option>
            <option value="3 / 2">3:2</option>
          </select>
        </label>

        <label>
          <span>像素比上限</span>
          <output id="pixel-ratio-value">2.00</output>
          <input id="pixel-ratio" type="range" min="1" max="2" step="0.25" value="2" />
        </label>

        <dl class="metrics">
          <div>
            <dt>CSS 尺寸</dt>
            <dd id="css-size">0 x 0</dd>
          </div>
          <div>
            <dt>绘制缓冲区</dt>
            <dd id="buffer-size">0 x 0</dd>
          </div>
          <div>
            <dt>相机比例</dt>
            <dd id="camera-aspect">0</dd>
          </div>
          <div>
            <dt>DPR</dt>
            <dd id="dpr-state">0</dd>
          </div>
          <div>
            <dt>触发来源</dt>
            <dd id="resize-reason">初始化</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script type="module" src="./src/responsive-container-main.js"></script>
  </body>
</html>
