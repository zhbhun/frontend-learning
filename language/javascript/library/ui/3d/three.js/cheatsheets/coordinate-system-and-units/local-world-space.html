<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>局部与世界空间</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">坐标与单位</a>
        <h1 id="page-title">局部与世界空间</h1>

        <div class="control-group">
          <h2>Parent</h2>
          <label class="control-row">
            <span>Y 轴旋转</span>
            <output id="angle-output">45°</output>
            <input id="angle-input" type="range" min="-180" max="180" step="1" value="45" />
          </label>
          <label class="control-row">
            <span>parent X</span>
            <output id="parent-x-output">0.0</output>
            <input id="parent-x-input" type="range" min="-2" max="2" step="0.1" value="0" />
          </label>
        </div>

        <div class="control-group">
          <h2>Child</h2>
          <label class="control-row">
            <span>局部 X</span>
            <output id="child-x-output">1.6</output>
            <input id="child-x-input" type="range" min="0.4" max="3" step="0.1" value="1.6" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>弧度</dt>
            <dd id="radians-readout">0.785</dd>
          </div>
          <div>
            <dt>child local</dt>
            <dd id="child-local-readout">(1.6, 0.3, 0.0)</dd>
          </div>
          <div>
            <dt>child world</dt>
            <dd id="child-world-readout">(0.00, 0.30, 0.00)</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="局部与世界空间预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>world axes + parent axes</span>
          <span id="toolbar-readout">parent 45°</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/local-world-space-main.js"></script>
  </body>
</html>
