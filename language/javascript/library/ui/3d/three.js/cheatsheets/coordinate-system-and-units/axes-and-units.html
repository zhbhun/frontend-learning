<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>坐标轴与单位</title>
  </head>
  <body>
    <main class="example-layout">
      <section class="control-panel" aria-labelledby="page-title">
        <a class="back-link" href="/">坐标与单位</a>
        <h1 id="page-title">坐标轴与单位</h1>

        <div class="control-group">
          <h2>Vector3</h2>
          <label class="control-row">
            <span>X</span>
            <output id="x-output">1.0</output>
            <input id="x-input" type="range" min="-3" max="3" step="0.1" value="1" />
          </label>
          <label class="control-row">
            <span>Y</span>
            <output id="y-output">0.5</output>
            <input id="y-input" type="range" min="-0.5" max="2.5" step="0.1" value="0.5" />
          </label>
          <label class="control-row">
            <span>Z</span>
            <output id="z-output">-1.0</output>
            <input id="z-input" type="range" min="-3" max="3" step="0.1" value="-1" />
          </label>
        </div>

        <div class="control-group">
          <h2>Unit</h2>
          <label class="control-row">
            <span>边长</span>
            <output id="size-output">1.0</output>
            <input id="size-input" type="range" min="0.4" max="2.4" step="0.1" value="1" />
          </label>
        </div>

        <dl class="metrics">
          <div>
            <dt>position</dt>
            <dd id="position-readout">(1.0, 0.5, -1.0)</dd>
          </div>
          <div>
            <dt>边长</dt>
            <dd id="edge-readout">1.0 unit</dd>
          </div>
          <div>
            <dt>底部 Y</dt>
            <dd id="bottom-y-readout">0.0</dd>
          </div>
        </dl>
      </section>

      <section class="stage-panel" aria-label="坐标轴与单位预览">
        <div class="stage-toolbar" aria-hidden="true">
          <span>网格每格 1 unit</span>
          <span id="toolbar-readout">X red / Y green / Z blue</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="scene-canvas"></canvas>
        </div>
      </section>
    </main>
    <script type="module" src="/src/axes-and-units-main.js"></script>
  </body>
</html>
