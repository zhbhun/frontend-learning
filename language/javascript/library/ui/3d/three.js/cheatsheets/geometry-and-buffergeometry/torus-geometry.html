<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TorusGeometry</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">几何</a>
      <span>TorusGeometry</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="TorusGeometry 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>圆环</h1>
        <label>主半径 <output id="radius-value"></output><input id="radius" type="range" min="0.8" max="2.4" step="0.1" value="1.35" /></label>
        <label>管道半径 <output id="tube-value"></output><input id="tube" type="range" min="0.1" max="0.75" step="0.05" value="0.32" /></label>
        <label>管道分段 <output id="radial-segments-value"></output><input id="radial-segments" type="range" min="3" max="24" step="1" value="10" /></label>
        <label>环向分段 <output id="tubular-segments-value"></output><input id="tubular-segments" type="range" min="6" max="96" step="1" value="36" /></label>
        <label>圆弧 <output id="arc-value"></output><input id="arc" type="range" min="90" max="360" step="15" value="360" /></label>
        <dl class="metrics">
          <div><dt>顶点</dt><dd id="vertex-count"></dd></div>
          <div><dt>索引</dt><dd id="index-count"></dd></div>
          <div><dt>三角形</dt><dd id="triangle-count"></dd></div>
          <div><dt>尺寸</dt><dd id="bounds-size"></dd></div>
          <div><dt>构造</dt><dd id="params"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/torus-geometry-main.js"></script>
  </body>
</html>
