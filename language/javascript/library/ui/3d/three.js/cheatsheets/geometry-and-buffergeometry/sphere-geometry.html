<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SphereGeometry</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">几何</a>
      <span>SphereGeometry</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="SphereGeometry 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>球体</h1>
        <label>半径 <output id="radius-value"></output><input id="radius" type="range" min="0.6" max="2.2" step="0.1" value="1.4" /></label>
        <label>水平分段 <output id="width-segments-value"></output><input id="width-segments" type="range" min="3" max="48" step="1" value="18" /></label>
        <label>垂直分段 <output id="height-segments-value"></output><input id="height-segments" type="range" min="2" max="32" step="1" value="12" /></label>
        <label>水平扫角 <output id="phi-length-value"></output><input id="phi-length" type="range" min="60" max="360" step="15" value="360" /></label>
        <label>垂直扫角 <output id="theta-length-value"></output><input id="theta-length" type="range" min="45" max="180" step="15" value="180" /></label>
        <dl class="metrics">
          <div><dt>顶点</dt><dd id="vertex-count"></dd></div>
          <div><dt>索引</dt><dd id="index-count"></dd></div>
          <div><dt>三角形</dt><dd id="triangle-count"></dd></div>
          <div><dt>尺寸</dt><dd id="bounds-size"></dd></div>
          <div><dt>构造</dt><dd id="params"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/sphere-geometry-main.js"></script>
  </body>
</html>
