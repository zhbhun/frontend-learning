<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CylinderGeometry</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">几何</a>
      <span>CylinderGeometry</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="CylinderGeometry 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>圆柱</h1>
        <label>上半径 <output id="radius-top-value"></output><input id="radius-top" type="range" min="0" max="2" step="0.1" value="1" /></label>
        <label>下半径 <output id="radius-bottom-value"></output><input id="radius-bottom" type="range" min="0.2" max="2" step="0.1" value="1.2" /></label>
        <label>高度 <output id="height-value"></output><input id="height" type="range" min="0.6" max="3.5" step="0.1" value="2.2" /></label>
        <label>径向分段 <output id="radial-segments-value"></output><input id="radial-segments" type="range" min="3" max="48" step="1" value="16" /></label>
        <label>高度分段 <output id="height-segments-value"></output><input id="height-segments" type="range" min="1" max="12" step="1" value="2" /></label>
        <label class="check-row"><input id="open-ended" type="checkbox" /> 去掉顶盖和底盖</label>
        <dl class="metrics">
          <div><dt>顶点</dt><dd id="vertex-count"></dd></div>
          <div><dt>索引</dt><dd id="index-count"></dd></div>
          <div><dt>三角形</dt><dd id="triangle-count"></dd></div>
          <div><dt>尺寸</dt><dd id="bounds-size"></dd></div>
          <div><dt>构造</dt><dd id="params"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/cylinder-geometry-main.js"></script>
  </body>
</html>
