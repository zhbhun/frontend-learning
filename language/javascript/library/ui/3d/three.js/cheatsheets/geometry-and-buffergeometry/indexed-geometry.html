<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indexed Geometry</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">几何</a>
      <span>Indexed Geometry</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="索引几何预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>索引复用</h1>
        <label>底边 <output id="base-value"></output><input id="base" type="range" min="1" max="3.2" step="0.1" value="2.2" /></label>
        <label>高度 <output id="height-value"></output><input id="height" type="range" min="0.6" max="3.2" step="0.1" value="1.8" /></label>
        <dl class="metrics">
          <div><dt>唯一顶点</dt><dd id="vertex-count"></dd></div>
          <div><dt>index.count</dt><dd id="index-count"></dd></div>
          <div><dt>三角形</dt><dd id="triangle-count"></dd></div>
          <div><dt>尺寸</dt><dd id="bounds-size"></dd></div>
          <div><dt>索引序列</dt><dd id="index-preview"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/indexed-geometry-main.js"></script>
  </body>
</html>
