<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoxGeometry</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">几何</a>
      <span>BoxGeometry</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="BoxGeometry 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>盒子</h1>
        <label>宽度 <output id="width-value"></output><input id="width" type="range" min="0.5" max="3.5" step="0.1" value="2" /></label>
        <label>高度 <output id="height-value"></output><input id="height" type="range" min="0.5" max="3.5" step="0.1" value="1.4" /></label>
        <label>深度 <output id="depth-value"></output><input id="depth" type="range" min="0.5" max="3.5" step="0.1" value="1.2" /></label>
        <label>X 分段 <output id="width-segments-value"></output><input id="width-segments" type="range" min="1" max="8" step="1" value="2" /></label>
        <label>Y 分段 <output id="height-segments-value"></output><input id="height-segments" type="range" min="1" max="8" step="1" value="2" /></label>
        <label>Z 分段 <output id="depth-segments-value"></output><input id="depth-segments" type="range" min="1" max="8" step="1" value="2" /></label>
        <dl class="metrics">
          <div><dt>顶点</dt><dd id="vertex-count"></dd></div>
          <div><dt>索引</dt><dd id="index-count"></dd></div>
          <div><dt>三角形</dt><dd id="triangle-count"></dd></div>
          <div><dt>尺寸</dt><dd id="bounds-size"></dd></div>
          <div><dt>构造</dt><dd id="params"></dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/box-geometry-main.js"></script>
  </body>
</html>
