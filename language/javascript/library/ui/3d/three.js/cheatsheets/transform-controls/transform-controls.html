<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransformControls</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">TransformControls</a>
      <span>单对象基础</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="TransformControls 单对象预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>TransformControls</h1>

        <label>
          <span>变换模式</span>
          <select id="mode-control">
            <option value="translate">translate</option>
            <option value="rotate">rotate</option>
            <option value="scale">scale</option>
          </select>
        </label>

        <label>
          <span>坐标空间（scale 固定 local）</span>
          <select id="space-control">
            <option value="world">world</option>
            <option value="local">local</option>
          </select>
        </label>

        <label class="check-row">
          <span>启用吸附</span>
          <input id="snap-control" type="checkbox" />
        </label>

        <label>
          <span>平移步长</span>
          <output id="translation-snap-output">0.50</output>
          <input id="translation-snap-control" type="range" min="0.1" max="2" step="0.1" value="0.5" />
        </label>

        <label>
          <span>旋转步长</span>
          <output id="rotation-snap-output">15°</output>
          <input id="rotation-snap-control" type="range" min="5" max="90" step="5" value="15" />
        </label>

        <label>
          <span>缩放步长</span>
          <output id="scale-snap-output">0.25</output>
          <input id="scale-snap-control" type="range" min="0.05" max="1" step="0.05" value="0.25" />
        </label>

        <label>
          <span>gizmo 尺寸</span>
          <output id="size-output">1.00</output>
          <input id="size-control" type="range" min="0.5" max="2" step="0.1" value="1" />
        </label>

        <fieldset>
          <legend>显示轴</legend>
          <label class="check-row"><span>X</span><input id="show-x-control" type="checkbox" checked /></label>
          <label class="check-row"><span>Y</span><input id="show-y-control" type="checkbox" checked /></label>
          <label class="check-row"><span>Z</span><input id="show-z-control" type="checkbox" checked /></label>
        </fieldset>

        <div class="button-row">
          <button id="attachment-control" type="button">detach</button>
          <button id="reset-object" type="button">恢复初始变换</button>
        </div>

        <dl class="metrics">
          <div><dt>mode / space</dt><dd id="mode-state">translate / world</dd></div>
          <div><dt>dragging</dt><dd id="drag-state">否</dd></div>
          <div><dt>position</dt><dd id="position-state">-</dd></div>
          <div><dt>rotation</dt><dd id="rotation-state">-</dd></div>
          <div><dt>scale</dt><dd id="scale-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/transform-controls-main.js"></script>
  </body>
</html>
