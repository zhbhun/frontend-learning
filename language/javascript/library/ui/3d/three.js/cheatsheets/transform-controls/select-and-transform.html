<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select and Transform</title>
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">TransformControls</a>
      <span>Raycaster 选择对象</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="选择并变换对象预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel">
        <h1>Select and Transform</h1>

        <label>
          <span>变换模式</span>
          <select id="mode-control">
            <option value="translate">translate</option>
            <option value="rotate">rotate</option>
            <option value="scale">scale</option>
          </select>
        </label>

        <button id="clear-selection" type="button">解除选择</button>

        <dl class="metrics">
          <div><dt>selected</dt><dd id="selected-state">无</dd></div>
          <div><dt>dragging</dt><dd id="drag-state">否</dd></div>
          <div><dt>position</dt><dd id="position-state">-</dd></div>
          <div><dt>rotation</dt><dd id="rotation-state">-</dd></div>
          <div><dt>scale</dt><dd id="scale-state">-</dd></div>
          <div><dt>action</dt><dd id="action-state">点击对象开始</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/select-and-transform-main.js"></script>
  </body>
</html>
