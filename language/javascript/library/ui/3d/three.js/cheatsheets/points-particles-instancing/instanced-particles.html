<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Points 与 InstancedMesh</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">粒子</a>
      <span>观察一个点云 draw call 与一个实例化小 mesh draw call 的取舍</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Points 与 InstancedMesh 对比预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="Points 与 InstancedMesh 控制面板">
        <h1>Points / InstancedMesh</h1>
        <label>
          显示对象
          <select id="visible-mode">
            <option value="both" selected>同时显示</option>
            <option value="points">只看 Points</option>
            <option value="instances">只看 InstancedMesh</option>
          </select>
        </label>
        <label>
          数量
          <select id="particle-count">
            <option value="400">400</option>
            <option value="1000" selected>1000</option>
            <option value="2200">2200</option>
          </select>
        </label>
        <label class="checkbox-row">
          更新实例矩阵
          <input id="animate-instances" type="checkbox" checked />
        </label>
        <label class="checkbox-row">
          旋转点云整体
          <input id="rotate-points" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>renderer</dt><dd id="render-state">-</dd></div>
          <div><dt>取舍</dt><dd id="tradeoff-state">-</dd></div>
          <div><dt>观察</dt><dd id="observe-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/instanced-particles-main.js"></script>
  </body>
</html>
