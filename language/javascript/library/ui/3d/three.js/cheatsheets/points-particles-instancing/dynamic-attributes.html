<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>attribute 上传</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">粒子</a>
      <span>观察 TypedArray 改动后哪些 attribute 需要 needsUpdate 才能上屏</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="动态 attribute 预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="动态 attribute 控制面板">
        <h1>动态 attribute</h1>
        <label>
          动画速度
          <span class="range-field">
            <input id="motion-speed" type="range" min="0" max="2.4" step="0.05" value="1" />
            <output id="motion-speed-value">1.00</output>
          </span>
        </label>
        <label>
          基础点径
          <span class="range-field">
            <input id="base-size" type="range" min="8" max="34" step="1" value="18" />
            <output id="base-size-value">18</output>
          </span>
        </label>
        <label class="checkbox-row">
          上传 position
          <input id="upload-position" type="checkbox" checked />
        </label>
        <label class="checkbox-row">
          上传 color
          <input id="upload-color" type="checkbox" checked />
        </label>
        <label class="checkbox-row">
          上传 aSize
          <input id="upload-size" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>needsUpdate</dt><dd id="update-state">-</dd></div>
          <div><dt>attribute</dt><dd id="attribute-state">-</dd></div>
          <div><dt>观察</dt><dd id="observe-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/dynamic-attributes-main.js"></script>
  </body>
</html>
