<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PointsMaterial 透明边界</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">粒子</a>
      <span>观察 PointsMaterial 的贴图、alphaTest、transparent 和 depthWrite</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="PointsMaterial 透明边界预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="PointsMaterial 透明边界控制面板">
        <h1>PointsMaterial 透明边界</h1>
        <label>
          点贴图
          <select id="map-mode">
            <option value="none">无贴图方点</option>
            <option value="hard" selected>圆形硬边</option>
            <option value="soft">圆形软边</option>
          </select>
        </label>
        <label>
          alphaTest
          <span class="range-field">
            <input id="alpha-test" type="range" min="0" max="0.9" step="0.02" value="0.08" />
            <output id="alpha-test-value">0.08</output>
          </span>
        </label>
        <label>
          点大小
          <span class="range-field">
            <input id="material-size" type="range" min="8" max="58" step="1" value="28" />
            <output id="material-size-value">28</output>
          </span>
        </label>
        <label class="checkbox-row">
          transparent
          <input id="transparent" type="checkbox" checked />
        </label>
        <label class="checkbox-row">
          depthWrite
          <input id="depth-write" type="checkbox" />
        </label>
        <label class="checkbox-row">
          sizeAttenuation
          <input id="material-attenuation" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>material</dt><dd id="material-state">-</dd></div>
          <div><dt>纹理</dt><dd id="texture-state">-</dd></div>
          <div><dt>观察</dt><dd id="observe-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/point-material-alpha-main.js"></script>
  </body>
</html>
