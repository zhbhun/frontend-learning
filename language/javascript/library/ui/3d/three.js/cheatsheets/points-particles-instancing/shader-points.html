<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gl_PointSize 和 gl_PointCoord</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">粒子</a>
      <span>观察 ShaderMaterial 如何用 gl_PointSize 和 gl_PointCoord 画颗粒外观</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="Shader 粒子预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="Shader 粒子控制面板">
        <h1>Shader 粒子</h1>
        <label>
          片元形状
          <select id="shape-mode">
            <option value="disc">圆点</option>
            <option value="ring" selected>光环</option>
            <option value="spark">星芒</option>
          </select>
        </label>
        <label>
          点大小
          <span class="range-field">
            <input id="shader-size" type="range" min="10" max="64" step="1" value="34" />
            <output id="shader-size-value">34</output>
          </span>
        </label>
        <label>
          边缘柔和
          <span class="range-field">
            <input id="softness" type="range" min="0.02" max="0.22" step="0.01" value="0.08" />
            <output id="softness-value">0.08</output>
          </span>
        </label>
        <label>
          时间速度
          <span class="range-field">
            <input id="time-speed" type="range" min="0" max="2.2" step="0.05" value="1" />
            <output id="time-speed-value">1.00</output>
          </span>
        </label>
        <dl class="metrics">
          <div><dt>uniform</dt><dd id="uniform-state">-</dd></div>
          <div><dt>shader</dt><dd id="shader-state">-</dd></div>
          <div><dt>观察</dt><dd id="observe-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/shader-points-main.js"></script>
  </body>
</html>
