<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BufferGeometry 点云</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="./index.html">粒子</a>
      <span>观察一个 THREE.Points 如何用 BufferGeometry attribute 提交大量点</span>
    </header>
    <main class="lesson-shell">
      <section class="viewport" aria-label="BufferGeometry 点云预览">
        <canvas id="scene-canvas"></canvas>
      </section>
      <aside class="panel" aria-label="BufferGeometry 点云控制面板">
        <h1>BufferGeometry 点云</h1>
        <label>
          点数量
          <select id="point-count">
            <option value="800">800</option>
            <option value="3200" selected>3200</option>
            <option value="12000">12000</option>
          </select>
        </label>
        <label>
          分布形态
          <select id="cloud-shape">
            <option value="sphere">球形</option>
            <option value="disk">星盘</option>
            <option value="wave">波面</option>
          </select>
        </label>
        <label>
          点大小
          <span class="range-field">
            <input id="point-size" type="range" min="1" max="12" step="0.5" value="4" />
            <output id="point-size-value">4</output>
          </span>
        </label>
        <label class="checkbox-row">
          透视缩放
          <input id="size-attenuation" type="checkbox" checked />
        </label>
        <dl class="metrics">
          <div><dt>attribute</dt><dd id="attribute-state">-</dd></div>
          <div><dt>draw call</dt><dd id="draw-state">-</dd></div>
          <div><dt>观察</dt><dd id="observe-state">-</dd></div>
        </dl>
      </aside>
    </main>
    <script type="module" src="./src/points-buffer-main.js"></script>
  </body>
</html>
